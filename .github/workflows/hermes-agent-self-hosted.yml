name: Hermes Agent Self Hosted Runtime

on:
  workflow_dispatch:
  push:
    paths:
      - 'hermes-agent-auto/**'
      - '.github/workflows/hermes-agent-self-hosted.yml'

jobs:
  run-hermes-agent:
    name: Run Hermes Agent on self-hosted machine
    runs-on: [self-hosted, hermes-agent]
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Hermes Agent runtime
        working-directory: hermes-agent-auto
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "Created .env from .env.example. Edit it on the runner machine for real search keys."
          fi
          mkdir -p storage/reports
          docker compose -p hermes_agent_auto_selfhosted up -d --build hermes-agent

      - name: Verify health endpoint
        working-directory: hermes-agent-auto
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8099/health; then
              echo "Hermes Agent is healthy on the self-hosted runner."
              exit 0
            fi
            sleep 2
          done
          docker compose -p hermes_agent_auto_selfhosted logs hermes-agent
          exit 1

      - name: Show runtime status
        working-directory: hermes-agent-auto
        shell: bash
        run: |
          docker compose -p hermes_agent_auto_selfhosted ps
          docker ps --filter name=hermes-agent-auto-runtime
