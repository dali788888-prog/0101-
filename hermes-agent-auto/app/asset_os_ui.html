<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes AssetOps OS v10.1 控制台</title><style>:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--warn:#f5b841;--bad:#ff5c7a;--blue:#5b8cff;--purple:#9b7bff;--shadow:0 18px 60px rgba(0,0,0,.35)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),radial-gradient(circle at top right,#2b185c 0,transparent 30%),var(--bg);color:var(--text)}.shell{max-width:1600px;margin:0 auto;padding:28px}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:22px}.top h1{margin:0;font-size:34px}.top p{margin:8px 0 0;color:var(--muted)}a{color:#93a4c7}.cards{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;margin-bottom:18px}.card,.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}.card{padding:16px;min-height:96px}.label{color:var(--muted);font-size:13px}.value{font-size:22px;font-weight:850;margin-top:9px;word-break:break-word}.panel{padding:18px;margin-bottom:18px}.panel h2{margin:0 0 14px;font-size:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--text);border-radius:12px;padding:12px 13px;font-size:14px;outline:none}textarea{min-height:86px;resize:vertical;line-height:1.55}button{border:0;border-radius:12px;padding:11px 14px;color:white;background:var(--blue);font-weight:750;cursor:pointer}button.secondary{background:rgba(255,255,255,.09);border:1px solid var(--line)}button.purple{background:var(--purple)}button.danger{background:#9f2241}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.list{display:flex;flex-direction:column;gap:10px;max-height:430px;overflow:auto}.item{border:1px solid var(--line);border-radius:14px;padding:13px;background:rgba(0,0,0,.14)}.item-title{display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:800}.item-meta{color:var(--muted);font-size:12px;margin-top:7px;line-height:1.5}.badge{padding:4px 8px;border-radius:999px;font-size:12px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}.ok{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:16px;padding:16px;max-height:520px;overflow:auto;color:#dfe8ff}.muted{color:var(--muted)}.toast{position:fixed;right:22px;bottom:22px;background:#111827;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);display:none;max-width:420px}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{padding:10px 12px;border:1px solid var(--line);border-radius:999px;text-decoration:none;background:rgba(255,255,255,.04)}@media(max-width:1100px){.grid,.cards,.row{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}</style></head><body><div class="shell"><div class="top"><div><h1>Hermes AssetOps OS v10.1 ⚡</h1><p>多链资产登记、TRC20/ERC20 余额监控、链上交易事件解析、策略风控、审批审计。</p></div><div class="nav"><a href="/">主控制台</a><a href="/tron-ui">TRON 权限</a></div></div><div class="cards"><div class="card"><div class="label">系统</div><div id="status" class="value">--</div></div><div class="card"><div class="label">链</div><div id="chainsCount" class="value">0</div></div><div class="card"><div class="label">钱包</div><div id="walletsCount" class="value">0</div></div><div class="card"><div class="label">Token监控</div><div id="tokenCount" class="value">0</div></div><div class="card"><div class="label">交易事件</div><div id="eventCount" class="value">0</div></div><div class="card"><div class="label">策略</div><div id="policiesCount" class="value">0</div></div><div class="card"><div class="label">草稿</div><div id="txCount" class="value">0</div></div><div class="card"><div class="label">告警</div><div id="alertsCount" class="value">0</div></div></div><div class="grid"><div><div class="panel"><h2>1. 登记链</h2><div class="row"><div><label>链名称</label><input id="chainName" value="tron"></div><div><label>链类型</label><select id="chainType"><option>tron</option><option>evm</option><option>btc</option><option>solana</option><option>cosmos</option></select></div></div><label style="margin-top:12px">RPC URL</label><input id="chainRpc" value="https://api.trongrid.io"><label style="margin-top:12px">Explorer URL</label><input id="chainExplorer" value="https://tronscan.org"><div class="actions"><button onclick="createChain()">登记链</button><button class="secondary" onclick="loadAll()">刷新</button></div></div><div class="panel"><h2>2. 登记钱包</h2><div class="row"><div><label>标签</label><input id="walletLabel" value="TRC20 Treasury"></div><div><label>链</label><input id="walletChain" value="tron"></div></div><label style="margin-top:12px">地址</label><input id="walletAddress" placeholder="T... 或 0x..."><div class="row" style="margin-top:12px"><div><label>钱包类型</label><select id="walletType"><option>watch</option><option>safe</option><option>tron-permission</option><option>cex-readonly</option><option>cold</option><option>hot</option></select></div><div><label>风险等级</label><select id="walletRisk"><option>medium</option><option>low</option><option>high</option><option>critical</option></select></div></div><div class="actions"><button onclick="createWallet()">登记钱包</button></div></div><div class="panel"><h2>3. Token 余额监控</h2><div class="row"><div><label>Wallet ID</label><input id="tmWalletId" type="number" value="1"></div><div><label>标准</label><select id="tmStandard"><option>trc20</option><option>trx-native</option><option>erc20</option><option>evm-native</option></select></div></div><div class="row" style="margin-top:12px"><div><label>Token Symbol</label><input id="tmSymbol" value="USDT"></div><div><label>Decimals</label><input id="tmDecimals" type="number" value="6"></div></div><label style="margin-top:12px">Token Contract，TRC20 可留空自动读首个 USDT；ERC20 必填</label><input id="tmContract" placeholder="TRON contract 或 0x..."><div class="actions"><button class="purple" onclick="createTokenMonitor()">创建并检查</button><button class="secondary" onclick="refreshAllTokens()">刷新全部 Token</button></div></div><div class="panel"><h2>4. 交易事件解析</h2><div class="row"><div><label>Wallet ID</label><input id="evWalletId" type="number" value="1"></div><div><label>Token Monitor ID，可空</label><input id="evMonitorId" type="number"></div></div><div class="row" style="margin-top:12px"><div><label>EVM 回看区块</label><input id="lookback" type="number" value="5000"></div><div><label>Limit</label><input id="limit" type="number" value="30"></div></div><div class="actions"><button onclick="syncEvents()">同步交易事件</button></div></div><div class="panel"><h2>5. 创建风控策略</h2><div class="row"><div><label>策略名称</label><input id="policyName" value="Treasury Basic Policy"></div><div><label>Scope</label><input id="policyScope" value="global"></div></div><label style="margin-top:12px">允许地址，每行一个；为空表示不限</label><textarea id="allowed"></textarea><label style="margin-top:12px">禁止地址，每行一个</label><textarea id="denied"></textarea><div class="row" style="margin-top:12px"><div><label>Token 白名单，逗号分隔</label><input id="tokenAllow" value="USDT-TRC20,USDT,USDC"></div><div><label>Method 白名单，逗号分隔</label><input id="methodAllow" value="transfer"></div></div><div class="row" style="margin-top:12px"><div><label>单笔限额 native</label><input id="maxSingle" value="100"></div><div><label>日限额 native</label><input id="maxDaily" value="500"></div></div><div class="actions"><button class="purple" onclick="createPolicy()">创建策略</button></div></div><div class="panel"><h2>6. 创建交易草稿</h2><div class="row"><div><label>标题</label><input id="txTitle" value="Treasury transfer draft"></div><div><label>链</label><input id="txChain" value="tron"></div></div><label style="margin-top:12px">Source Wallet 地址</label><input id="sourceWallet" placeholder="T... 或 0x..."><label style="margin-top:12px">To 地址</label><input id="toAddress" placeholder="T... 或 0x..."><div class="row" style="margin-top:12px"><div><label>Value native</label><input id="txValue" value="0"></div><div><label>Token 地址，可空</label><input id="tokenAddress"></div></div><div class="row" style="margin-top:12px"><div><label>Method</label><input id="methodName" value="transfer"></div><div><label>Policy ID，可空</label><input id="policyId" type="number"></div></div><label style="margin-top:12px">Calldata</label><textarea id="calldata">0x</textarea><label style="margin-top:12px">Purpose / 用途说明</label><input id="purpose"><div class="actions"><button onclick="createTxDraft()">创建草稿并评分</button></div></div><div class="panel"><h2>7. 审批 / 执行记录</h2><div class="row"><div><label>Tx ID</label><input id="opTxId" type="number" value="1"></div><div><label>Operator</label><input id="operator" value="local-operator"></div></div><label style="margin-top:12px">备注 / 执行 Tx Hash</label><textarea id="opData"></textarea><div class="actions"><button onclick="approveTx()">批准</button><button class="danger" onclick="rejectTx()">拒绝</button><button class="secondary" onclick="payload()">查看 Payload</button><button class="secondary" onclick="markExecuted()">标记执行</button></div></div><div class="panel"><h2>输出</h2><pre id="out">等待操作...</pre></div></div><div><div class="panel"><h2>钱包列表</h2><div id="wallets" class="list"></div></div><div class="panel"><h2>Token 监控列表</h2><div id="tokenMonitors" class="list"></div></div><div class="panel"><h2>交易事件</h2><div id="txEvents" class="list"></div></div><div class="panel"><h2>链列表</h2><div id="chains" class="list"></div></div><div class="panel"><h2>策略列表</h2><div id="policies" class="list"></div></div><div class="panel"><h2>交易草稿</h2><div id="txs" class="list"></div></div><div class="panel"><h2>告警</h2><div id="alerts" class="list"></div></div></div></div></div><div id="toast" class="toast"></div><script>const headers={'Content-Type':'application/json'};function show(o){out.textContent=typeof o==='string'?o:JSON.stringify(o,null,2)}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',3500)}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function cls(s){return s==='approved'||s==='executed'||s==='ok'||s==='low'||s==='success'?'ok':s==='rejected'||s==='critical'||s==='error'?'bad':'warn'}async function api(p,o={}){const r=await fetch(p,o);const text=await r.text();let d;try{d=JSON.parse(text)}catch{d=text}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function lines(id){return document.getElementById(id).value.split(/\r?\n/).map(x=>x.trim()).filter(Boolean)}function csv(id){return document.getElementById(id).value.split(',').map(x=>x.trim()).filter(Boolean)}function maybeNum(v){return v===''?null:parseInt(v)}async function loadAll(){try{const st=await api('/asset-os/status');status.textContent=st.version||st.status;const d=await api('/asset-os/dashboard');chainsCount.textContent=d.counts.chains;walletsCount.textContent=d.counts.wallets;tokenCount.textContent=d.counts.token_monitors;eventCount.textContent=d.counts.tx_events;policiesCount.textContent=d.counts.policies;txCount.textContent=d.counts.tx_drafts;alertsCount.textContent=d.counts.open_alerts;renderChains(await api('/asset-os/chains'));renderWallets(await api('/asset-os/wallets'));renderTokenMonitors(await api('/asset-os/token-monitors'));renderEvents(await api('/asset-os/tx-events'));renderPolicies(await api('/asset-os/policies'));renderTxs(await api('/asset-os/tx-drafts'));renderAlerts(await api('/asset-os/alerts'))}catch(e){show(e.message)}}function renderChains(a){chains.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.chain)}</span><span class="badge ok">${esc(x.chain_type)}</span></div><div class="item-meta">RPC:${esc(x.rpc_url)}<br>Explorer:${esc(x.explorer_url)}</div></div>`).join(''):'<div class="muted">暂无链</div>'}function renderWallets(a){wallets.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.label)}</span><span class="badge ${cls(x.risk_tier)}">${esc(x.risk_tier)}</span></div><div class="item-meta">ID:${x.id} · ${esc(x.chain)} · ${esc(x.wallet_type)}<br>${esc(x.address)}<br>${esc(x.custody_model)}</div></div>`).join(''):'<div class="muted">暂无钱包</div>'}function renderTokenMonitors(a){tokenMonitors.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.token_symbol)}</span><span class="badge ${cls(x.last_status)}">${esc(x.last_status||'new')}</span></div><div class="item-meta">ID:${x.id} · WalletID:${x.wallet_id} · ${esc(x.token_standard)}<br>${esc(x.wallet_label)} · ${esc(x.wallet_address)}<br>余额:${esc(x.last_balance||'--')} raw:${esc(x.last_balance_raw||'--')}<br>${esc(x.last_error||'')}</div><div class="actions"><button class="secondary" onclick="refreshToken(${x.id})">立即刷新</button></div></div>`).join(''):'<div class="muted">暂无 Token 监控</div>'}function renderEvents(a){txEvents.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.direction)} ${esc(x.token_symbol||'')}</span><span class="badge warn">${esc(x.method)}</span></div><div class="item-meta">WalletID:${x.wallet_id} · ${esc(x.chain)} · block:${esc(x.block_number)}<br>value:${esc(x.value_display)} raw:${esc(x.value_raw)}<br>counterparty:${esc(x.counterparty)}<br>tx:${esc(x.tx_hash)}</div></div>`).join(''):'<div class="muted">暂无交易事件</div>'}function renderPolicies(a){policies.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.name)}</span><span class="badge warn">${esc(x.scope)}</span></div><div class="item-meta">ID:${x.id} · 单笔:${esc(x.max_single_native)} · 日限额:${esc(x.max_daily_native)}</div></div>`).join(''):'<div class="muted">暂无策略</div>'}function renderTxs(a){txs.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.title)}</span><span class="badge ${cls(x.risk_tier)}">${esc(x.risk_tier)}</span></div><div class="item-meta">ID:${x.id} · ${esc(x.chain)} · ${esc(x.approval_state)}<br>To:${esc(x.to_address)} · Value:${esc(x.value_native)}<br>Hash:${esc(x.payload_hash)}</div></div>`).join(''):'<div class="muted">暂无交易草稿</div>'}function renderAlerts(a){alerts.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.alert_type)}</span><span class="badge ${cls(x.severity)}">${esc(x.severity)}</span></div><div class="item-meta">${esc(x.message)}<br>${esc(x.status)} · ${esc(x.created_at)}</div></div>`).join(''):'<div class="muted">暂无告警</div>'}async function createChain(){try{show(await api('/asset-os/chains',{method:'POST',headers,body:JSON.stringify({chain:chainName.value,chain_type:chainType.value,rpc_url:chainRpc.value||null,explorer_url:chainExplorer.value||null,enabled:true})}));toast('链已登记');loadAll()}catch(e){show(e.message)}}async function createWallet(){try{show(await api('/asset-os/wallets',{method:'POST',headers,body:JSON.stringify({label:walletLabel.value,chain:walletChain.value,address:walletAddress.value,wallet_type:walletType.value,custody_model:'non-custodial',risk_tier:walletRisk.value,enabled:true})}));toast('钱包已登记');loadAll()}catch(e){show(e.message)}}async function createTokenMonitor(){try{show(await api('/asset-os/token-monitors',{method:'POST',headers,body:JSON.stringify({wallet_id:parseInt(tmWalletId.value||'1'),token_standard:tmStandard.value,token_contract:tmContract.value||null,token_symbol:tmSymbol.value||'USDT',decimals:parseInt(tmDecimals.value||'6'),poll_minutes:5,enabled:true})}));toast('Token 监控已创建');loadAll()}catch(e){show(e.message)}}async function refreshToken(id){try{show(await api('/asset-os/token-monitors/'+id+'/refresh',{method:'POST'}));loadAll()}catch(e){show(e.message)}}async function refreshAllTokens(){try{show(await api('/asset-os/token-monitors/refresh-all',{method:'POST'}));loadAll()}catch(e){show(e.message)}}async function syncEvents(){try{show(await api('/asset-os/tx-events/sync',{method:'POST',headers,body:JSON.stringify({wallet_id:parseInt(evWalletId.value||'1'),token_monitor_id:maybeNum(evMonitorId.value),lookback_blocks:parseInt(lookback.value||'5000'),limit:parseInt(limit.value||'30')})}));toast('交易事件同步完成');loadAll()}catch(e){show(e.message)}}async function createPolicy(){try{show(await api('/asset-os/policies',{method:'POST',headers,body:JSON.stringify({name:policyName.value,scope:policyScope.value,allowed_addresses:lines('allowed'),denied_addresses:lines('denied'),token_allowlist:csv('tokenAllow'),method_allowlist:csv('methodAllow'),max_single_native:maxSingle.value||'0',max_daily_native:maxDaily.value||'0',require_approval_count:1,enabled:true})}));toast('策略已创建');loadAll()}catch(e){show(e.message)}}async function createTxDraft(){try{show(await api('/asset-os/tx-drafts',{method:'POST',headers,body:JSON.stringify({title:txTitle.value,chain:txChain.value,source_wallet:sourceWallet.value,to_address:toAddress.value,value_native:txValue.value||'0',token_address:tokenAddress.value||null,calldata:calldata.value||'0x',method_name:methodName.value||'transfer',purpose:purpose.value||'',policy_id:maybeNum(policyId.value)})}));toast('交易草稿已创建');loadAll()}catch(e){show(e.message)}}async function decision(d){try{show(await api('/asset-os/tx-drafts/approve',{method:'POST',headers,body:JSON.stringify({tx_id:parseInt(opTxId.value||'1'),operator:operator.value||'local-operator',decision:d,note:opData.value||''})}));toast('审批已记录');loadAll()}catch(e){show(e.message)}}function approveTx(){decision('approved')}function rejectTx(){decision('rejected')}async function payload(){try{show(await api('/asset-os/tx-drafts/'+parseInt(opTxId.value||'1')+'/payload'))}catch(e){show(e.message)}}async function markExecuted(){try{show(await api('/asset-os/tx-drafts/mark-executed',{method:'POST',headers,body:JSON.stringify({tx_id:parseInt(opTxId.value||'1'),tx_hash:opData.value,block_number:null,note:'marked from v10.1 UI'})}));toast('执行已记录');loadAll()}catch(e){show(e.message)}}loadAll();setInterval(loadAll,10000);</script></body></html>
