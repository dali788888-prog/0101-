<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes v15.9 Market Matrix</title><style>:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--bad:#ff5c7a;--blue:#5b8cff;--warn:#f5b841}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),var(--bg);color:var(--text);font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif}.wrap{padding:22px;max-width:1800px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}.top h1{margin:0;font-size:30px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:16px}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:16px}.card{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}.label{color:var(--muted);font-size:12px}.value{font-size:16px;font-weight:850;margin-top:8px}.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}button,input{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.22);color:var(--text)}button{background:var(--blue);border:0;font-weight:760;cursor:pointer}button.green{background:#25c46b}.grid{display:grid;grid-template-columns:1.45fr .55fr;gap:16px}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;min-width:1050px}th,td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:12px;text-align:right}th:first-child,td:first-child{text-align:left;position:sticky;left:0;background:#111a2e}th{color:#dfe8ff;background:rgba(255,255,255,.06)}.ok{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.list{max-height:680px;overflow:auto;display:flex;flex-direction:column;gap:9px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.16)}.item-title{display:flex;justify-content:space-between;gap:10px;font-weight:850}.badge{border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px}.log{white-space:pre-wrap;word-break:break-word;max-height:220px;overflow:auto;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:14px;padding:12px;color:#dfe8ff}@media(max-width:1200px){.grid,.row,.cards{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><h1>Hermes v15.9 多交易所矩阵行情屏</h1><div class="muted">Binance / OKX / Bybit / Gate.io 价格矩阵、跨所价差、盘口本地价差、成交强度观察。只读公开行情，不自动下单。</div></div><a class="badge" href="/">返回首页</a></div><div class="cards"><div class="card"><div class="label">状态</div><div id="status" class="value warn">等待刷新</div></div><div class="card"><div class="label">交易对数量</div><div id="symCount" class="value">0</div></div><div class="card"><div class="label">交易所数量</div><div id="providerCount" class="value">0</div></div><div class="card"><div class="label">最大价差</div><div id="maxGap" class="value">--</div></div><div class="card"><div class="label">机会数量</div><div id="oppCount" class="value">0</div></div><div class="card"><div class="label">更新时间</div><div id="updated" class="value">--</div></div></div><div class="panel"><div class="row"><input id="symbols" value="BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT" placeholder="symbols"><input id="providers" value="binance,okx,bybit,gate" placeholder="providers"><input id="gapAlert" value="0.20" placeholder="价差提醒阈值%"></div><div class="actions"><button class="green" onclick="loadMatrix()">刷新矩阵</button><button onclick="toggleAuto()" id="autoBtn">自动刷新: OFF</button><button onclick="exportMatrix()">导出矩阵JSON</button></div></div><div class="grid"><div class="panel"><h2>价格 / 盘口矩阵</h2><div class="tablewrap"><table id="matrixTable"><thead></thead><tbody></tbody></table></div></div><div class="panel"><h2>跨所价差观察</h2><div id="opps" class="list"></div></div></div><div class="panel"><h2>运行日志</h2><div id="log" class="log">Ready.</div></div></div><script>let lastData=null,auto=false,timer=null;function log(x){logEl.textContent=(new Date().toISOString()+' '+x+'\n'+logEl.textContent).slice(0,6000)}const logEl=document.getElementById('log');async function api(p,o={}){const r=await fetch(p,o);const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function fmt(n,d=4){return n==null?'--':Number(n).toLocaleString(undefined,{maximumFractionDigits:d})}function cls(n){if(n==null)return'';return Number(n)>=0?'ok':'bad'}async function loadMatrix(){try{status.textContent='刷新中';const syms=symbols.value.split(',').map(x=>x.trim()).filter(Boolean);const pros=providers.value.split(',').map(x=>x.trim()).filter(Boolean);const d=await api('/exchange-market/matrix',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbols:syms,providers:pros,include_depth:true,depth_limit:5})});lastData=d;status.textContent=d.status;status.className='value '+(d.status==='success'?'ok':'warn');symCount.textContent=syms.length;providerCount.textContent=pros.length;oppCount.textContent=(d.opportunities||[]).length;updated.textContent=d.time_utc||'--';const mx=(d.opportunities||[])[0];maxGap.textContent=mx?fmt(mx.gap_pct,4)+'%':'--';renderTable(d,syms,pros);renderOpps(d);log('matrix refreshed: '+d.status+' errors='+(d.errors||[]).length)}catch(e){status.textContent='错误';status.className='value bad';log('error '+e.message)}}function renderTable(d,syms,pros){const head='<tr><th>Symbol</th>'+pros.map(p=>`<th>${p.toUpperCase()} Last</th><th>${p.toUpperCase()} Bid/Ask</th><th>${p.toUpperCase()} Spread%</th>`).join('')+'</tr>';matrixTable.querySelector('thead').innerHTML=head;const by={};(d.cells||[]).forEach(c=>{by[c.symbol+'|'+c.provider]=c});matrixTable.querySelector('tbody').innerHTML=syms.map(s=>'<tr><td>'+s+'</td>'+pros.map(p=>{const c=by[s+'|'+p]||{};return `<td>${fmt(c.last,6)}</td><td><span class="ok">${fmt(c.best_bid,6)}</span> / <span class="bad">${fmt(c.best_ask,6)}</span></td><td>${fmt(c.local_spread_pct,5)}</td>`}).join('')+'</tr>').join('')}function renderOpps(d){const th=parseFloat(gapAlert.value||'0.2');opps.innerHTML=(d.opportunities||[]).map(o=>{const hot=(o.gap_pct||0)>=th;return `<div class="item"><div class="item-title"><span>${o.symbol}</span><span class="badge ${hot?'bad':'warn'}">${fmt(o.gap_pct,4)}%</span></div><div class="muted">低价参考：${o.buy_reference} ${fmt(o.low_price,6)}<br>高价参考：${o.sell_reference} ${fmt(o.high_price,6)}<br>价差：${fmt(o.gap,8)}<br>${o.note}</div></div>`}).join('')||'<div class="item">暂无价差数据</div>'}function toggleAuto(){auto=!auto;autoBtn.textContent='自动刷新: '+(auto?'ON':'OFF');if(timer)clearInterval(timer);if(auto){timer=setInterval(loadMatrix,15000);loadMatrix()}}function exportMatrix(){navigator.clipboard?.writeText(JSON.stringify(lastData,null,2));log('matrix exported to clipboard')}loadMatrix();</script></body></html>
