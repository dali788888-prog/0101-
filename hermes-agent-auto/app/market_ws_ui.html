<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hermes Market WS v15.7</title>
<style>
:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--bad:#ff5c7a;--blue:#5b8cff;--green:#25c46b;--warn:#f5b841}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),var(--bg);color:var(--text);font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif}.wrap{padding:22px;max-width:1700px;margin:0 auto}.top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.top h1{margin:0;font-size:30px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:16px}.grid{display:grid;grid-template-columns:1.3fr .7fr;gap:16px}.cards{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-top:16px}.card{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}.label{color:var(--muted);font-size:12px}.value{font-size:16px;font-weight:850;margin-top:8px;word-break:break-word}.row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}button,select,input{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.22);color:var(--text)}button{background:var(--blue);font-weight:760;cursor:pointer;border:0}button.green{background:var(--green)}button.bad{background:#9f2241}.chart{width:100%;height:470px;border:1px solid var(--line);border-radius:18px;background:rgba(0,0,0,.22)}.book{display:grid;grid-template-columns:1fr 1fr;gap:10px}.list{max-height:470px;overflow:auto;display:flex;flex-direction:column;gap:8px}.item{border:1px solid var(--line);border-radius:12px;padding:9px 10px;background:rgba(0,0,0,.16);font-size:12px}.ask{color:var(--bad)}.bid{color:var(--good)}.log{white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:auto;color:#dfe8ff;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:14px;padding:12px}.badge{display:inline-flex;padding:4px 8px;border:1px solid var(--line);border-radius:999px;font-size:12px}.ok{color:var(--good)}.warn{color:var(--warn)}.badc{color:var(--bad)}@media(max-width:1100px){.grid,.row,.cards{grid-template-columns:1fr}.chart{height:360px}}
</style>
</head>
<body><div class="wrap">
<div class="top"><div><h1>Hermes v15.7 WebSocket 实时行情中心 📈</h1><div class="muted">浏览器直连公开 WebSocket，后端 REST 做快照兜底。只读公开行情，不涉及账户、私钥、下单。</div></div><a class="badge" href="/">返回首页</a></div>
<div class="cards"><div class="card"><div class="label">连接状态</div><div id="wsStatus" class="value warn">未连接</div></div><div class="card"><div class="label">交易所</div><div id="providerCard" class="value">--</div></div><div class="card"><div class="label">交易对</div><div id="symbolCard" class="value">--</div></div><div class="card"><div class="label">最新价</div><div id="lastPrice" class="value">--</div></div><div class="card"><div class="label">24h变化</div><div id="changePct" class="value">--</div></div><div class="card"><div class="label">深度档位</div><div id="bookCount" class="value">0</div></div><div class="card"><div class="label">成交数</div><div id="tradeCount" class="value">0</div></div><div class="card"><div class="label">模式</div><div class="value">WS + REST</div></div></div>
<div class="panel"><div class="row"><select id="provider"><option value="binance">Binance WS</option><option value="okx">OKX WS</option><option value="bybit">Bybit WS</option><option value="gate">Gate.io WS</option></select><select id="symbol"><option>BTCUSDT</option><option>ETHUSDT</option><option>SOLUSDT</option><option>BNBUSDT</option><option>XRPUSDT</option></select><select id="interval"><option value="1m">1m</option><option value="5m">5m</option><option value="15m">15m</option><option value="1h">1h</option></select><input id="signalThreshold" value="0.20" placeholder="策略阈值%"></div><div class="actions"><button class="green" onclick="connectAll()">连接实时行情</button><button onclick="loadSnapshots()">加载REST快照</button><button onclick="disconnectAll()" class="bad">断开WS</button><button onclick="exportState()">导出当前状态</button></div></div>
<div class="grid"><div><div class="panel"><h2>实时价格走势</h2><canvas id="chart" class="chart"></canvas></div><div class="panel"><h2>策略信号叠加</h2><div id="signalBox" class="log">等待行情...</div></div></div><div><div class="panel"><h2>盘口深度</h2><div class="book"><div><div class="label">Bids</div><div id="bids" class="list"></div></div><div><div class="label">Asks</div><div id="asks" class="list"></div></div></div></div><div class="panel"><h2>实时成交流</h2><div id="trades" class="list"></div></div></div></div>
<div class="panel"><h2>连接日志</h2><div id="log" class="log">Ready.</div></div>
</div><script>
let sockets=[],prices=[],tradesArr=[],bidsArr=[],asksArr=[],last=0,baseline=0,lastSignal='';
function nSymbol(p,s){s=s.replace(/[-_\/]/g,'').toUpperCase();if(p==='okx'&&s.endsWith('USDT'))return s.slice(0,-4)+'-USDT';if(p==='gate'&&s.endsWith('USDT'))return s.slice(0,-4)+'_USDT';return s}
function log(x){logEl.textContent=(new Date().toISOString()+' '+x+'\n'+logEl.textContent).slice(0,5000)}
const logEl=document.getElementById('log');
function setStatus(s,c='warn'){wsStatus.textContent=s;wsStatus.className='value '+c}
function disconnectAll(){sockets.forEach(s=>{try{s.close()}catch(e){}});sockets=[];setStatus('已断开','warn');log('WS disconnected')}
function connectAll(){disconnectAll();prices=[];tradesArr=[];bidsArr=[];asksArr=[];baseline=0;const p=provider.value,s=symbol.value;providerCard.textContent=p;symbolCard.textContent=s;setStatus('连接中','warn');if(p==='binance')connectBinance(s);else if(p==='okx')connectOKX(s);else if(p==='bybit')connectBybit(s);else if(p==='gate')connectGate(s);loadSnapshots()}
function connectBinance(sym){const ss=sym.toLowerCase();openWS('wss://stream.binance.com:9443/stream?streams='+ss+'@ticker/'+ss+'@trade/'+ss+'@depth20@100ms',m=>{const d=m.data;if(d.e==='24hrTicker')tick(d.c,d.P,d.v);if(d.e==='trade')trade(d.p,d.q,d.m?'sell':'buy',d.T);if(d.bids&&d.asks)book(d.bids,d.asks)})}
function connectOKX(sym){const inst=nSymbol('okx',sym);const ws=openWS('wss://ws.okx.com:8443/ws/v5/public',m=>{const arg=m.arg||{},d=(m.data||[])[0];if(!d)return;if(arg.channel==='tickers')tick(d.last,null,d.vol24h);if(arg.channel==='trades')trade(d.px,d.sz,d.side,d.ts);if(arg.channel==='books5')book(d.bids||[],d.asks||[])});ws.onopen=()=>{setStatus('已连接','ok');ws.send(JSON.stringify({op:'subscribe',args:[{channel:'tickers',instId:inst},{channel:'trades',instId:inst},{channel:'books5',instId:inst}]}));log('OKX subscribed '+inst)}}
function connectBybit(sym){const s=nSymbol('bybit',sym);openWS('wss://stream.bybit.com/v5/public/spot',m=>{if(m.topic&&m.topic.startsWith('tickers')){const d=m.data||{};tick(d.lastPrice,d.price24hPcnt,d.volume24h)}if(m.topic&&m.topic.startsWith('publicTrade'))(m.data||[]).forEach(x=>trade(x.p,x.v,x.S,x.T));if(m.topic&&m.topic.startsWith('orderbook'))book((m.data||{}).b||[],(m.data||{}).a||[])},ws=>{ws.send(JSON.stringify({op:'subscribe',args:['tickers.'+s,'publicTrade.'+s,'orderbook.50.'+s]}));log('Bybit subscribed '+s)})}
function connectGate(sym){const pair=nSymbol('gate',sym);const ws=openWS('wss://api.gateio.ws/ws/v4/',m=>{if(m.channel==='spot.tickers'&&m.result)tick(m.result.last,m.result.change_percentage,m.result.base_volume);if(m.channel==='spot.trades'&&m.result)trade(m.result.price,m.result.amount,m.result.side,m.result.create_time_ms);if(m.channel==='spot.order_book'&&m.result)book(m.result.bids||[],m.result.asks||[])});ws.onopen=()=>{setStatus('已连接','ok');const t=Math.floor(Date.now()/1000);[['spot.tickers',[pair]],['spot.trades',[pair]],['spot.order_book',[pair,'20','100ms']]].forEach(([ch,payload])=>ws.send(JSON.stringify({time:t,channel:ch,event:'subscribe',payload})));log('Gate subscribed '+pair)}}
function openWS(url,onMsg,onOpen){const ws=new WebSocket(url);sockets.push(ws);ws.onopen=()=>{setStatus('已连接','ok');log('connected '+url);if(onOpen)onOpen(ws)};ws.onmessage=e=>{try{onMsg(JSON.parse(e.data))}catch(err){}};ws.onerror=e=>{setStatus('错误','bad');log('ws error '+url)};ws.onclose=()=>{if(sockets.includes(ws))setStatus('断开','warn');log('closed '+url)};return ws}
function tick(price,chg,vol){last=parseFloat(price);if(!baseline)baseline=last;lastPrice.textContent=last||'--';changePct.textContent=chg==null?'--':chg;prices.push({t:Date.now(),p:last});if(prices.length>240)prices.shift();draw();signal()}
function trade(price,qty,side,time){tradesArr.unshift({price,qty,side,time});tradesArr=tradesArr.slice(0,80);tradeCount.textContent=tradesArr.length;trades.innerHTML=tradesArr.slice(0,35).map(x=>`<div class="item ${String(x.side).toLowerCase().includes('sell')?'ask':'bid'}">${x.side||''} ${x.price} × ${x.qty}</div>`).join('')}
function book(bids,asks){bidsArr=bids.slice(0,20);asksArr=asks.slice(0,20);bookCount.textContent=bidsArr.length+'/'+asksArr.length;bids.innerHTML=bidsArr.map(x=>`<div class="item bid">${x[0]} × ${x[1]}</div>`).join('');asks.innerHTML=asksArr.map(x=>`<div class="item ask">${x[0]} × ${x[1]}</div>`).join('')}
function draw(){const c=chart,ctx=c.getContext('2d');c.width=c.clientWidth;c.height=c.clientHeight;ctx.clearRect(0,0,c.width,c.height);if(prices.length<2)return;const vals=prices.map(x=>x.p),min=Math.min(...vals),max=Math.max(...vals);ctx.strokeStyle='rgba(91,140,255,.95)';ctx.lineWidth=2;ctx.beginPath();prices.forEach((v,i)=>{const x=i/(prices.length-1)*c.width,y=c.height-((v.p-min)/(max-min||1))*c.height;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();ctx.fillStyle='#93a4c7';ctx.fillText('Last '+last+'  High '+max+'  Low '+min,12,18)}
function signal(){const th=parseFloat(signalThreshold.value||'0.2');if(!baseline||!last)return;const pct=(last-baseline)/baseline*100;let s='HOLD';if(pct>th)s='WATCH LONG / 动量上行';if(pct<-th)s='WATCH SHORT / 动量下行';lastSignal=`基准价 ${baseline}\n最新价 ${last}\n区间变化 ${pct.toFixed(4)}%\n策略提示：${s}\n说明：只做信号提醒，不自动下单。`;signalBox.textContent=lastSignal}
async function api(p,o={}){const r=await fetch(p,o);const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}
async function loadSnapshots(){const p=provider.value,s=symbol.value;try{const d=await api('/exchange-market/depth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:p,symbol:s,limit:20})});book(d.bids||[],d.asks||[])}catch(e){log('depth fail '+e.message)}try{const d=await api('/exchange-market/trades',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:p,symbol:s,limit:30})});(d.trades||[]).reverse().forEach(x=>trade(x.price,x.qty,x.side,x.time))}catch(e){log('trades fail '+e.message)}try{const d=await api('/exchange-market/candles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:p,symbol:s,interval:interval.value,limit:160})});prices=(d.candles||[]).map(x=>({t:x.t,p:parseFloat(x.close)}));if(prices.length){baseline=prices[0].p;last=prices[prices.length-1].p;lastPrice.textContent=last}draw();signal()}catch(e){log('candles fail '+e.message)}}
function exportState(){const data={provider:provider.value,symbol:symbol.value,last,baseline,signal:lastSignal,bids:bidsArr,asks:asksArr,trades:tradesArr.slice(0,20),prices:prices.slice(-60)};navigator.clipboard?.writeText(JSON.stringify(data,null,2));log('state exported to clipboard')}
loadSnapshots();
</script></body></html>
