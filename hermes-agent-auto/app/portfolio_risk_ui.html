<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes v17.6 Portfolio Risk</title><style>:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--bad:#ff5c7a;--blue:#5b8cff;--warn:#f5b841;--green:#25c46b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),radial-gradient(circle at top right,#33215f 0,transparent 28%),var(--bg);color:var(--text);font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif}.wrap{padding:22px;max-width:1800px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}.top h1{margin:0;font-size:30px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:16px;box-shadow:0 18px 60px rgba(0,0,0,.32)}.cards{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;margin-top:16px}.card{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}.label{color:var(--muted);font-size:12px}.value{font-size:16px;font-weight:850;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}button,input,select,textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.22);color:var(--text);width:100%}textarea{min-height:80px;resize:vertical}button{background:var(--blue);border:0;font-weight:760;cursor:pointer;width:auto}button.green{background:var(--green)}button.secondary{background:rgba(255,255,255,.08);border:1px solid var(--line)}.list{max-height:660px;overflow:auto;display:flex;flex-direction:column;gap:9px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.16)}.item-title{display:flex;justify-content:space-between;gap:10px;font-weight:850}.badge{border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px}.ok{color:var(--good)}.badc{color:var(--bad)}.warn{color:var(--warn)}pre{white-space:pre-wrap;word-break:break-word;max-height:660px;overflow:auto;background:rgba(0,0,0,.24);border:1px solid var(--line);border-radius:14px;padding:12px;color:#dfe8ff}.dangerBox{border-color:rgba(255,92,122,.45);background:rgba(255,92,122,.08)}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{background:rgba(255,255,255,.07);border:1px solid var(--line)}.tabs button.active{background:linear-gradient(90deg,var(--blue),#9b7bff);border-color:transparent}@media(max-width:1150px){.grid,.grid3,.cards{grid-template-columns:1fr}.top{flex-direction:column}}</style></head><body><div class="wrap"><div class="top"><div><h1>Hermes v17.6 组合敞口 + 风险预算 + 手工交易日志</h1><div class="muted">组合敞口仪表盘、每日风险预算账本、手工交易日志、周策略复盘。只做记账和复盘，不自动下单。</div></div><a class="badge" href="/">返回首页</a></div><div class="cards"><div class="card"><div class="label">总市值</div><div id="totalValue" class="value">0</div></div><div class="card"><div class="label">未实现PnL</div><div id="unrealized" class="value">0</div></div><div class="card"><div class="label">预算状态</div><div id="budgetStatus" class="value warn">--</div></div><div class="card"><div class="label">剩余风险</div><div id="remainingRisk" class="value">0</div></div><div class="card"><div class="label">日志PnL</div><div id="journalPnl" class="value">0</div></div><div class="card"><div class="label">Paper PnL</div><div id="paperPnl" class="value">0</div></div><div class="card"><div class="label">Warnings</div><div id="warnCount" class="value badc">0</div></div><div class="card"><div class="label">模式</div><div class="value">Bookkeeping</div></div></div><div class="panel dangerBox"><b>安全红线：</b>本中心只做组合敞口、风险预算、交易日志和策略周复盘；不会提交真实订单。</div><div class="panel"><div class="tabs"><button class="active" onclick="showTab('dash',this);loadDash()">仪表盘</button><button onclick="showTab('posTab',this);loadPositions()">组合敞口</button><button onclick="showTab('budgetTab',this);loadBudgets()">风险预算</button><button onclick="showTab('journalTab',this);loadJournal()">手工交易日志</button><button onclick="showTab('weeklyTab',this);loadWeekly()">周策略复盘</button><button onclick="showTab('reportTab',this);loadReport()">报告</button></div></div><section id="dash" class="tab"><div class="grid"><div class="panel"><h2>风险总览</h2><div class="actions"><button class="green" onclick="loadDash()">刷新</button><button onclick="window.open('/paper-trading-ui')">Paper Trading</button><button onclick="window.open('/trade-lifecycle-ui')">Lifecycle</button></div><div id="warnings" class="list"></div></div><div class="panel"><h2>输出</h2><pre id="out">等待加载...</pre></div></div></section><section id="posTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>新增组合持仓</h2><div class="grid3"><input id="pAccount" value="manual"><input id="pSymbol" value="BTCUSDT"><input id="pQty" value="0.001"></div><div class="grid3" style="margin-top:10px"><input id="pCost" placeholder="cost basis"><input id="pMark" placeholder="mark price 可空"><select id="pProvider"><option>binance</option><option>okx</option><option>bybit</option><option>gate</option></select></div><textarea id="pNotes" placeholder="备注" style="margin-top:10px"></textarea><div class="actions"><button class="green" onclick="createPosition()">保存持仓</button><button onclick="loadPositions()">刷新持仓</button></div></div><div class="panel"><h2>持仓列表</h2><div id="positions" class="list"></div></div></div></section><section id="budgetTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>新增风险预算</h2><div class="grid3"><input id="bDate" placeholder="YYYY-MM-DD"><select id="bScope"><option>daily</option><option>weekly</option><option>monthly</option><option>campaign</option></select><input id="bStart" value="100"></div><div class="grid3" style="margin-top:10px"><input id="bMaxLoss" value="20"><input id="bUsed" value="0"><input id="bReserved" value="0"></div><textarea id="bNotes" placeholder="预算备注" style="margin-top:10px"></textarea><div class="actions"><button class="green" onclick="createBudget()">保存预算</button><button onclick="loadBudgets()">刷新预算</button></div></div><div class="panel"><h2>预算列表</h2><div id="budgets" class="list"></div></div></div></section><section id="journalTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>新增手工交易日志</h2><div class="grid3"><input id="jDate" placeholder="YYYY-MM-DD"><select id="jSource"><option>manual</option><option>paper</option><option>readiness</option><option>lifecycle</option><option>external</option></select><input id="jSymbol" value="BTCUSDT"></div><div class="grid3" style="margin-top:10px"><select id="jSide"><option>buy</option><option>sell</option><option>long</option><option>short</option><option>close</option></select><input id="jQty" value="0"><input id="jEntry" value="0"></div><div class="grid3" style="margin-top:10px"><input id="jExit" value="0"><input id="jPnl" value="0"><input id="jFees" value="0"></div><div class="grid3" style="margin-top:10px"><select id="jOutcome"><option>open</option><option>win</option><option>loss</option><option>breakeven</option><option>cancelled</option><option>reviewed</option></select><input id="jTicket" placeholder="related_ticket_id"><input id="jPaper" placeholder="paper_order_id"></div><textarea id="jNotes" placeholder="交易复盘备注" style="margin-top:10px"></textarea><div class="actions"><button class="green" onclick="createJournal()">保存日志</button><button onclick="loadJournal()">刷新日志</button></div></div><div class="panel"><h2>日志列表</h2><div id="journal" class="list"></div></div></div></section><section id="weeklyTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>生成周策略复盘</h2><input id="wLabel" placeholder="例如 2026-W22"><textarea id="wSummary" placeholder="可空，自动生成摘要" style="margin-top:10px"></textarea><textarea id="wActions" placeholder="可空，自动生成 action items" style="margin-top:10px"></textarea><div class="actions"><button class="green" onclick="generateWeekly()">生成周复盘</button><button onclick="loadWeekly()">刷新周复盘</button></div></div><div class="panel"><h2>周复盘列表</h2><div id="weekly" class="list"></div></div></div></section><section id="reportTab" class="tab" style="display:none"><div class="panel"><h2>组合风险报告</h2><div class="actions"><button class="green" onclick="loadReport()">生成报告</button></div><pre id="reportOut">等待生成...</pre></div></section></div><script>function $(id){return document.getElementById(id)}async function api(p,o={}){const r=await fetch(p,o);const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function item(title,status,meta){let c=status==='ok'||status==='win'||status==='closed'?'ok':status==='breached'||status==='loss'?'badc':'warn';return `<div class="item"><div class="item-title"><span>${esc(title)}</span><span class="badge ${c}">${esc(status)}</span></div><div class="muted">${esc(meta).slice(0,1800)}</div></div>`}function showTab(id,btn){document.querySelectorAll('.tab').forEach(x=>x.style.display='none');$(id).style.display='block';document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active')}function today(){return new Date().toISOString().slice(0,10)}bDate.value=today();jDate.value=today();async function loadDash(){try{const d=await api('/portfolio-risk/dashboard');const ps=d.positions.summary||{};totalValue.textContent=ps.total_market_value_usdt||0;unrealized.textContent=ps.total_unrealized_pnl_usdt||0;budgetStatus.textContent=d.risk_budget.status;remainingRisk.textContent=d.risk_budget.remaining_risk_usdt;journalPnl.textContent=d.journal.summary.net_pnl_usdt;paperPnl.textContent=d.paper.realized_pnl||0;warnCount.textContent=(d.warnings||[]).length;warnings.innerHTML=(d.warnings||[]).map(w=>item(w,'warning','')).join('')||'<div class="item">暂无警告</div>';out.textContent=JSON.stringify(d,null,2)}catch(e){out.textContent=e.message}}async function createPosition(){try{const d=await api('/portfolio-risk/positions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({account_label:pAccount.value,symbol:pSymbol.value,qty:pQty.value,cost_basis:pCost.value||'0',mark_price:pMark.value||'0',provider:pProvider.value,source:'manual',notes:pNotes.value})});out.textContent=JSON.stringify(d,null,2);await loadPositions();await loadDash()}catch(e){out.textContent=e.message}}async function loadPositions(){try{const d=await api('/portfolio-risk/positions');positions.innerHTML=(d.positions||[]).map(p=>item(`#${p.id} ${p.symbol}`,p.source,`qty=${p.qty}\nvalue=${p.market_value_usdt}\nunrealized=${p.unrealized_pnl_usdt}`)).join('')||'<div class="item">暂无持仓</div>'}catch(e){positions.innerHTML=item('持仓加载失败','error',e.message)}}async function createBudget(){try{const d=await api('/portfolio-risk/risk-budgets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({budget_date:bDate.value||today(),scope:bScope.value,starting_budget_usdt:bStart.value,max_daily_loss_usdt:bMaxLoss.value,used_loss_usdt:bUsed.value,reserved_risk_usdt:bReserved.value,status:'open',notes:bNotes.value})});out.textContent=JSON.stringify(d,null,2);await loadBudgets();await loadDash()}catch(e){out.textContent=e.message}}async function loadBudgets(){try{const d=await api('/portfolio-risk/risk-budgets');budgets.innerHTML=(d.budgets||[]).map(b=>item(`${b.budget_date} ${b.scope}`,b.status,`max_loss=${b.max_daily_loss_usdt}\nused=${b.used_loss_usdt}\nreserved=${b.reserved_risk_usdt}`)).join('')||'<div class="item">暂无预算</div>'}catch(e){budgets.innerHTML=item('预算加载失败','error',e.message)}}async function createJournal(){try{const d=await api('/portfolio-risk/journal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({trade_date:jDate.value||today(),source:jSource.value,symbol:jSymbol.value,side:jSide.value,qty:jQty.value,entry_price:jEntry.value,exit_price:jExit.value,pnl_usdt:jPnl.value,fees_usdt:jFees.value,outcome:jOutcome.value,related_ticket_id:jTicket.value?parseInt(jTicket.value):null,related_paper_order_id:jPaper.value?parseInt(jPaper.value):null,notes:jNotes.value})});out.textContent=JSON.stringify(d,null,2);await loadJournal();await loadDash()}catch(e){out.textContent=e.message}}async function loadJournal(){try{const d=await api('/portfolio-risk/journal?limit=100');journal.innerHTML=(d.entries||[]).map(j=>item(`${j.trade_date} ${j.symbol} ${j.side}`,j.outcome,`pnl=${j.pnl_usdt}\nfees=${j.fees_usdt}\nsource=${j.source}\n${j.notes||''}`)).join('')||'<div class="item">暂无日志</div>'}catch(e){journal.innerHTML=item('日志加载失败','error',e.message)}}async function generateWeekly(){try{const d=await api('/portfolio-risk/weekly-review/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({week_label:wLabel.value,summary:wSummary.value,action_items:wActions.value,auto_generate:true})});out.textContent=JSON.stringify(d,null,2);await loadWeekly()}catch(e){out.textContent=e.message}}async function loadWeekly(){try{const d=await api('/portfolio-risk/weekly-reviews?limit=50');weekly.innerHTML=(d.reviews||[]).map(w=>item(w.week_label,'reviewed',`${w.summary}\n\n${w.action_items||''}`)).join('')||'<div class="item">暂无周复盘</div>'}catch(e){weekly.innerHTML=item('周复盘加载失败','error',e.message)}}async function loadReport(){try{const d=await api('/portfolio-risk/report');reportOut.textContent=d.content}catch(e){reportOut.textContent=e.message}}loadDash();</script></body></html>
