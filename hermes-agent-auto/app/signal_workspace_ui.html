<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes v16.2 Signal Workspace</title><style>:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--bad:#ff5c7a;--blue:#5b8cff;--warn:#f5b841}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),var(--bg);color:var(--text);font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif}.wrap{padding:22px;max-width:1700px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}.top h1{margin:0;font-size:30px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:16px}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:16px}.card{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}.label{color:var(--muted);font-size:12px}.value{font-size:16px;font-weight:850;margin-top:8px}.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}button,input,select{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.22);color:var(--text)}button{background:var(--blue);border:0;font-weight:760;cursor:pointer}button.green{background:#25c46b}button.bad{background:#9f2241}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.list{max-height:650px;overflow:auto;display:flex;flex-direction:column;gap:9px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.16)}.item-title{display:flex;justify-content:space-between;gap:10px;font-weight:850}.badge{border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px}.ok{color:var(--good)}.badc{color:var(--bad)}.warn{color:var(--warn)}pre{white-space:pre-wrap;word-break:break-word;max-height:620px;overflow:auto;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:14px;padding:12px;color:#dfe8ff}@media(max-width:1100px){.grid,.row,.cards{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><h1>Hermes v16.2 信号日报与工作区自动化</h1><div class="muted">把策略信号自动写入 Operator 工作区：每日信号日报、高分信号笔记、复盘笔记、Operator 通知、run_id 绑定。</div></div><a class="badge" href="/">返回首页</a></div><div class="cards"><div class="card"><div class="label">今日日报</div><div id="dailyStatus" class="value warn">检测中</div></div><div class="card"><div class="label">高分笔记</div><div id="noteCount" class="value">0</div></div><div class="card"><div class="label">Open信号</div><div id="openCount" class="value">0</div></div><div class="card"><div class="label">High信号</div><div id="highCount" class="value badc">0</div></div><div class="card"><div class="label">Medium信号</div><div id="mediumCount" class="value warn">0</div></div><div class="card"><div class="label">模式</div><div class="value">Research Only</div></div></div><div class="panel"><div class="row"><select id="period"><option value="daily">daily</option><option value="weekly">weekly</option><option value="monthly">monthly</option></select><input id="limit" value="80" placeholder="信号数量"><select id="force"><option value="false">不重复生成日报</option><option value="true">强制重新生成</option></select></div><div class="actions"><button class="green" onclick="syncWorkspace()">同步到 Operator 工作区</button><button onclick="loadStatus()">刷新工作区状态</button><button onclick="runSignalAndSync()">运行信号分析并同步</button><button onclick="loadReports()">查看工作区报告</button><button onclick="loadNotes()">查看信号笔记</button><button onclick="window.open('/strategy-signals-ui')">打开信号中心</button></div></div><div class="grid"><div class="panel"><h2>工作区状态 / 输出</h2><pre id="out">等待操作...</pre></div><div class="panel"><h2>日报 / 笔记列表</h2><div id="list" class="list"></div></div></div><div class="panel"><h2>安全边界</h2><div class="muted">该模块只同步研究信号到工作区与报告系统，不自动下单、不连接交易账户、不读取 API Key、不触碰私钥。</div></div></div><script>async function api(p,o={}){const r=await fetch(p,o);const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function item(title,status,meta){return `<div class="item"><div class="item-title"><span>${esc(title)}</span><span class="badge ${status==='high'?'badc':status==='medium'?'warn':'ok'}">${esc(status)}</span></div><div class="muted">${esc(meta).slice(0,1500)}</div></div>`}async function loadStatus(){try{const d=await api('/strategy-signals/summary');out.textContent=JSON.stringify(d,null,2);const w=d.workspace||{};dailyStatus.textContent=w.daily_report_generated?'已生成':'未生成';dailyStatus.className='value '+(w.daily_report_generated?'ok':'warn');noteCount.textContent=(w.recent_signal_notes||[]).length;openCount.textContent=(d.counts||{}).open||0;highCount.textContent=(d.counts||{}).high_open||0;mediumCount.textContent=(d.counts||{}).medium_open||0;list.innerHTML=(w.recent_signal_notes||[]).map(n=>item(n.title,'note',n.content+'\n'+n.created_at)).join('')||'<div class="item">暂无信号笔记</div>'}catch(e){out.textContent=e.message}}async function syncWorkspace(){try{const d=await api('/strategy-signals/workspace-sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({period:period.value,limit:parseInt(limit.value||'80'),create_high_notes:true,create_report:true,notify_operator:true,force:force.value==='true',operator:'local-operator'})});out.textContent=JSON.stringify(d,null,2);await loadStatus()}catch(e){out.textContent=e.message}}async function runSignalAndSync(){try{const a=await api('/strategy-signals/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({providers:['binance','okx','bybit','gate'],symbols:['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT'],spread_threshold_pct:0.20,momentum_threshold_pct:1.50,local_spread_max_pct:0.15,persist:true})});const s=await api('/strategy-signals/workspace-sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({period:period.value,limit:80,create_high_notes:true,create_report:true,notify_operator:true,force:force.value==='true'})});out.textContent=JSON.stringify({analyze:a,workspace_sync:s},null,2);await loadStatus()}catch(e){out.textContent=e.message}}async function loadReports(){const d=await api('/operator-chat/workspace/reports?limit=50');out.textContent=JSON.stringify(d,null,2);list.innerHTML=(d.reports||[]).filter(r=>r.period==='signal_daily').map(r=>item(r.title,'report',r.content)).join('')||'<div class="item">暂无信号日报</div>'}async function loadNotes(){const d=await api('/operator-chat/workspace/notes?limit=100');out.textContent=JSON.stringify(d,null,2);list.innerHTML=(d.notes||[]).filter(n=>(n.tags||'').includes('strategy_signal')).map(n=>item(n.title,'note',n.content)).join('')||'<div class="item">暂无信号笔记</div>'}loadStatus();setInterval(loadStatus,20000)</script></body></html>
