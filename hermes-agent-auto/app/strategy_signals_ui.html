<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes v16.0 Strategy Signals</title><style>:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--bad:#ff5c7a;--blue:#5b8cff;--warn:#f5b841}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),var(--bg);color:var(--text);font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif}.wrap{padding:22px;max-width:1800px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px}.top h1{margin:0;font-size:30px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:16px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:16px}.card{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}.label{color:var(--muted);font-size:12px}.value{font-size:16px;font-weight:850;margin-top:8px}.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}button,input{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.22);color:var(--text)}button{background:var(--blue);border:0;font-weight:760;cursor:pointer}button.green{background:#25c46b}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.list{max-height:650px;overflow:auto;display:flex;flex-direction:column;gap:9px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.16)}.item-title{display:flex;justify-content:space-between;gap:10px;font-weight:850}.badge{border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px}.ok{color:var(--good)}.bad{color:var(--bad)}.warn{color:var(--warn)}.log,pre{white-space:pre-wrap;word-break:break-word;max-height:520px;overflow:auto;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:14px;padding:12px;color:#dfe8ff}@media(max-width:1100px){.grid,.row,.cards{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><h1>Hermes v16.0 策略研究与信号中心</h1><div class="muted">价差阈值、动量观察、流动性快照、信号入库和信号报告。研究模式：不自动交易、不连接账户、不使用私钥。</div></div><a class="badge" href="/">返回首页</a></div><div class="cards"><div class="card"><div class="label">状态</div><div id="status" class="value warn">等待分析</div></div><div class="card"><div class="label">信号数量</div><div id="sigCount" class="value">0</div></div><div class="card"><div class="label">高风险</div><div id="highCount" class="value">0</div></div><div class="card"><div class="label">中风险</div><div id="medCount" class="value">0</div></div><div class="card"><div class="label">模式</div><div class="value">Research Only</div></div></div><div class="panel"><div class="row"><input id="symbols" value="BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT"><input id="spread" value="0.20" placeholder="跨所价差阈值%"><input id="momentum" value="1.50" placeholder="24h动量阈值%"></div><div class="row" style="margin-top:10px"><input id="providers" value="binance,okx,bybit,gate"><input id="localSpread" value="0.15" placeholder="盘口价差阈值%"><input id="persist" value="true" placeholder="persist true/false"></div><div class="actions"><button class="green" onclick="analyze()">运行信号分析</button><button onclick="loadEvents()">查看信号库</button><button onclick="loadReport()">生成信号报告</button><button onclick="window.open('/market-matrix-ui')">打开矩阵屏</button></div></div><div class="grid"><div class="panel"><h2>候选策略信号</h2><div id="signals" class="list"></div></div><div class="panel"><h2>信号报告 / 输出</h2><pre id="out">等待操作...</pre></div></div><div class="panel"><h2>安全边界</h2><div class="muted">所有信号均为研究观察，不是交易建议；系统不会自动下单，也未计入手续费、滑点、资金费率、转账延迟、交易所限额、账户风控、KYC/地区限制等真实交易成本。</div></div></div><script>async function api(p,o={}){const r=await fetch(p,o);const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function sev(s){return s==='high'?'bad':s==='medium'?'warn':'ok'}function render(items){signals.innerHTML=(items||[]).map(x=>`<div class="item"><div class="item-title"><span>${esc(x.symbol)} · ${esc(x.signal_type)}</span><span class="badge ${sev(x.severity)}">${esc(x.severity)} · ${esc(x.score)}</span></div><div class="muted">${esc(x.summary)}<br><br>${esc(x.risk_note||'')}</div></div>`).join('')||'<div class="item">暂无信号</div>';sigCount.textContent=(items||[]).length;highCount.textContent=(items||[]).filter(x=>x.severity==='high').length;medCount.textContent=(items||[]).filter(x=>x.severity==='medium').length}async function analyze(){try{status.textContent='分析中';const d=await api('/strategy-signals/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({providers:providers.value.split(',').map(x=>x.trim()).filter(Boolean),symbols:symbols.value.split(',').map(x=>x.trim()).filter(Boolean),spread_threshold_pct:parseFloat(spread.value),momentum_threshold_pct:parseFloat(momentum.value),local_spread_max_pct:parseFloat(localSpread.value),persist:persist.value!=='false'})});status.textContent=d.status;status.className='value ok';render(d.signals);out.textContent=JSON.stringify(d,null,2)}catch(e){status.textContent='错误';status.className='value bad';out.textContent=e.message}}async function loadEvents(){const d=await api('/strategy-signals/events?limit=100');render(d.events.map(x=>x.payload));out.textContent=JSON.stringify(d,null,2)}async function loadReport(){const d=await api('/strategy-signals/report?limit=50');out.textContent=d.content;render(d.events.map(x=>x.payload))}loadEvents().catch(()=>{});</script></body></html>
