<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes v19.6 System Map</title><style>:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--bad:#ff5c7a;--blue:#5b8cff;--warn:#f5b841;--green:#25c46b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),radial-gradient(circle at top right,#33215f 0,transparent 28%),var(--bg);color:var(--text);font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif}.wrap{padding:22px;max-width:1800px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}.top h1{margin:0;font-size:30px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:16px;box-shadow:0 18px 60px rgba(0,0,0,.32)}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:16px}.card{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}.label{color:var(--muted);font-size:12px}.value{font-size:16px;font-weight:850;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}button,input,select{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.22);color:var(--text)}button{background:var(--blue);border:0;font-weight:760;cursor:pointer}.green{background:var(--green)}.secondary{background:rgba(255,255,255,.08);border:1px solid var(--line)}.list{max-height:660px;overflow:auto;display:flex;flex-direction:column;gap:9px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.16)}.item-title{display:flex;justify-content:space-between;gap:10px;font-weight:850}.badge{border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px}.ok{color:var(--good)}.badc{color:var(--bad)}.warn{color:var(--warn)}pre{white-space:pre-wrap;word-break:break-word;max-height:660px;overflow:auto;background:rgba(0,0,0,.24);border:1px solid var(--line);border-radius:14px;padding:12px;color:#dfe8ff}.dangerBox{border-color:rgba(255,92,122,.45);background:rgba(255,92,122,.08)}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{background:rgba(255,255,255,.07);border:1px solid var(--line)}.tabs button.active{background:linear-gradient(90deg,var(--blue),#9b7bff);border-color:transparent}.graph{position:relative;min-height:680px;border:1px solid var(--line);border-radius:20px;background:rgba(0,0,0,.16);overflow:auto;padding:18px}.node{display:inline-flex;margin:8px;padding:10px 12px;border:1px solid var(--line);border-radius:999px;background:rgba(91,140,255,.14);font-size:13px}.edge{font-size:12px;color:var(--muted);padding:6px 10px;border-left:2px solid rgba(91,140,255,.6);margin:6px 0}@media(max-width:1150px){.grid,.cards{grid-template-columns:1fr}.top{flex-direction:column}}</style></head><body><div class="wrap"><div class="top"><div><h1>Hermes v19.6 系统地图 / 模块关系图 / 配置可视化</h1><div class="muted">展示系统模块、路由、依赖关系和脱敏配置。配置中心只读，不显示完整密钥。</div></div><a class="badge" href="/">返回首页</a></div><div class="cards"><div class="card"><div class="label">Nodes</div><div id="nodeCount" class="value">0</div></div><div class="card"><div class="label">Edges</div><div id="edgeCount" class="value">0</div></div><div class="card"><div class="label">UI Routes</div><div id="routeCount" class="value">0</div></div><div class="card"><div class="label">Search Provider</div><div id="searchProvider" class="value">--</div></div><div class="card"><div class="label">Model</div><div id="modelName" class="value">--</div></div><div class="card"><div class="label">模式</div><div class="value">Read Only</div></div></div><div class="panel dangerBox"><b>安全红线：</b>这里只显示脱敏配置和关系图，不暴露 API Key / Token / Secret，不执行修改操作。</div><div class="panel"><div class="tabs"><button class="active" onclick="showTab('graphTab',this);loadDash()">系统地图</button><button onclick="showTab('configTab',this);loadConfig()">配置中心</button><button onclick="showTab('routesTab',this);loadRoutes()">UI 路由</button><button onclick="showTab('rawTab',this);loadDash()">Raw JSON</button></div></div><section id="graphTab" class="tab"><div class="grid"><div class="panel"><h2>模块节点</h2><div class="actions"><button class="green" onclick="loadDash()">刷新地图</button><button onclick="window.open('/diagnostics-ui')">Diagnostics</button></div><div id="nodes" class="graph"></div></div><div class="panel"><h2>模块关系</h2><div id="edges" class="list"></div></div></div></section><section id="configTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>脱敏配置</h2><div class="actions"><button class="green" onclick="loadConfig()">刷新配置</button></div><pre id="configOut">等待加载...</pre></div><div class="panel"><h2>配置分组</h2><div id="configGroups" class="list"></div></div></div></section><section id="routesTab" class="tab" style="display:none"><div class="panel"><h2>UI 路由目录</h2><div class="actions"><button class="green" onclick="loadRoutes()">刷新路由</button></div><div id="routes" class="list"></div></div></section><section id="rawTab" class="tab" style="display:none"><div class="panel"><h2>Raw Dashboard JSON</h2><pre id="rawOut">等待加载...</pre></div></section></div><script>function $(id){return document.getElementById(id)}async function api(p){const r=await fetch(p);const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function item(title,status,meta){return `<div class="item"><div class="item-title"><span>${esc(title)}</span><span class="badge ok">${esc(status)}</span></div><div class="muted">${esc(meta).slice(0,2200)}</div></div>`}function showTab(id,btn){document.querySelectorAll('.tab').forEach(x=>x.style.display='none');$(id).style.display='block';document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active')}async function loadDash(){try{const d=await api('/system-map/dashboard');const g=d.graph||{};nodeCount.textContent=(g.nodes||[]).length;edgeCount.textContent=(g.edges||[]).length;routeCount.textContent=(d.ui_routes||[]).length;searchProvider.textContent=((d.config||{}).search||{}).search_provider||'--';modelName.textContent=((d.config||{}).llm||{}).ollama_model||'--';nodes.innerHTML=(g.nodes||[]).map(n=>`<span class="node">${esc(n.label)} · ${esc(n.group)}</span>`).join('');edges.innerHTML=(g.edges||[]).map(e=>`<div class="edge">${esc(e.from)} → ${esc(e.to)} · ${esc(e.label)}</div>`).join('');rawOut.textContent=JSON.stringify(d,null,2)}catch(e){rawOut.textContent=e.message}}async function loadConfig(){try{const d=await api('/system-map/config');configOut.textContent=JSON.stringify(d,null,2);const c=d.config||{};configGroups.innerHTML=Object.keys(c).map(k=>item(k,'config',JSON.stringify(c[k],null,2))).join('')}catch(e){configOut.textContent=e.message}}async function loadRoutes(){try{const d=await api('/system-map/ui-routes');routeCount.textContent=d.count;routes.innerHTML=(d.routes||[]).map(r=>`<div class="item"><div class="item-title"><span>${esc(r.title)}</span><a class="badge ok" href="${esc(r.path)}" target="_blank">打开</a></div><div class="muted">${esc(r.path)}</div></div>`).join('')}catch(e){routes.innerHTML=item('路由加载失败','error',e.message)}}loadDash();</script></body></html>
