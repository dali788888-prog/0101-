<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes v17 Trade Lifecycle</title><style>:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--bad:#ff5c7a;--blue:#5b8cff;--warn:#f5b841;--green:#25c46b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),radial-gradient(circle at top right,#33215f 0,transparent 28%),var(--bg);color:var(--text);font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif}.wrap{padding:22px;max-width:1800px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}.top h1{margin:0;font-size:30px}.muted{color:var(--muted);font-size:13px;line-height:1.55}.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;padding:16px;margin-top:16px;box-shadow:0 18px 60px rgba(0,0,0,.32)}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:16px}.card{border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.035)}.label{color:var(--muted);font-size:12px}.value{font-size:16px;font-weight:850;margin-top:8px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:12px}button,input,select,textarea{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(0,0,0,.22);color:var(--text);width:100%}textarea{min-height:94px;resize:vertical}button{background:var(--blue);border:0;font-weight:760;cursor:pointer;width:auto}button.green{background:var(--green)}button.bad{background:#9f2241}button.secondary{background:rgba(255,255,255,.08);border:1px solid var(--line)}.list{max-height:650px;overflow:auto;display:flex;flex-direction:column;gap:9px}.item{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(0,0,0,.16)}.item-title{display:flex;justify-content:space-between;gap:10px;font-weight:850}.badge{border:1px solid var(--line);border-radius:999px;padding:4px 8px;font-size:12px}.ok{color:var(--good)}.badc{color:var(--bad)}.warn{color:var(--warn)}pre{white-space:pre-wrap;word-break:break-word;max-height:660px;overflow:auto;background:rgba(0,0,0,.24);border:1px solid var(--line);border-radius:14px;padding:12px;color:#dfe8ff}.dangerBox{border-color:rgba(255,92,122,.45);background:rgba(255,92,122,.08)}.tabs{display:flex;gap:8px;flex-wrap:wrap}.tabs button{background:rgba(255,255,255,.07);border:1px solid var(--line)}.tabs button.active{background:linear-gradient(90deg,var(--blue),#9b7bff);border-color:transparent}@media(max-width:1150px){.grid,.grid3,.cards{grid-template-columns:1fr}.top{flex-direction:column}}</style></head><body><div class="wrap"><div class="top"><div><h1>Hermes v17.0 交易生命周期与复盘中心</h1><div class="muted">信号 → 票据 → 风险评分 → 审批 → 手工执行票据 → 外部成交 → 复盘 → Operator 报表。</div></div><a class="badge" href="/">返回首页</a></div><div class="cards"><div class="card"><div class="label">总票据</div><div id="total" class="value">0</div></div><div class="card"><div class="label">待审批</div><div id="pending" class="value warn">0</div></div><div class="card"><div class="label">已审批</div><div id="approved" class="value ok">0</div></div><div class="card"><div class="label">外部成交</div><div id="externalDone" class="value">0</div></div><div class="card"><div class="label">待复盘</div><div id="needsReview" class="value badc">0</div></div><div class="card"><div class="label">阻断</div><div id="blocked" class="value badc">0</div></div></div><div class="panel dangerBox"><b>安全红线：</b>生命周期中心只做记录、复盘、报表和工作区同步；不自动提交交易所订单。</div><div class="panel"><div class="tabs"><button class="active" onclick="showTab('dash',this);loadDash()">生命周期仪表盘</button><button onclick="showTab('timelineTab',this)">票据时间线</button><button onclick="showTab('reviewTab',this)">新增复盘</button><button onclick="showTab('reportTab',this);loadReport()">报表同步</button></div></div><section id="dash" class="tab"><div class="grid"><div class="panel"><h2>票据生命周期</h2><div class="actions"><button class="green" onclick="loadDash()">刷新</button><button onclick="window.open('/trade-readiness-ui')">Trade Readiness</button></div><div id="items" class="list"></div></div><div class="panel"><h2>输出</h2><pre id="out">等待加载...</pre></div></div></section><section id="timelineTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>查询票据时间线</h2><input id="timelineTicket" placeholder="ticket_id"><div class="actions"><button class="green" onclick="loadTimeline()">加载时间线</button></div><div id="timelineList" class="list"></div></div><div class="panel"><h2>时间线详情</h2><pre id="timelineOut">等待查询...</pre></div></div></section><section id="reviewTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>新增复盘记录</h2><div class="grid3"><input id="rTicket" placeholder="ticket_id"><select id="rType"><option>post_execution</option><option>pre_handoff</option><option>risk_review</option><option>operator_note</option></select><select id="rOutcome"><option>open</option><option>win</option><option>loss</option><option>breakeven</option><option>blocked</option><option>cancelled</option><option>needs_followup</option></select></div><textarea id="rSummary" placeholder="复盘摘要" style="margin-top:10px"></textarea><textarea id="rLessons" placeholder="经验教训" style="margin-top:10px"></textarea><textarea id="rFollow" placeholder="风险后续事项" style="margin-top:10px"></textarea><div class="actions"><button class="green" onclick="createReview()">保存复盘并同步 Operator</button></div></div><div class="panel"><h2>复盘输出</h2><pre id="reviewOut">等待操作...</pre></div></div></section><section id="reportTab" class="tab" style="display:none"><div class="grid"><div class="panel"><h2>生命周期报表</h2><div class="actions"><button class="green" onclick="loadReport()">生成报表</button><button onclick="syncOperator()">同步到 Operator 工作区</button></div><pre id="reportOut">等待生成...</pre></div><div class="panel"><h2>最近复盘</h2><div class="actions"><button onclick="loadReviews()">刷新复盘</button></div><div id="reviews" class="list"></div></div></div></section></div><script>function $(id){return document.getElementById(id)}async function api(p,o={}){const r=await fetch(p,o);const t=await r.text();let d;try{d=JSON.parse(t)}catch{d=t}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function item(title,status,meta){let c=status==='approved'||status==='external_done'||status==='low'||status==='win'?'ok':status==='blocked'||status==='critical'||status==='loss'||status==='BLOCK_MANUAL_HANDOFF'?'badc':'warn';return `<div class="item"><div class="item-title"><span>${esc(title)}</span><span class="badge ${c}">${esc(status)}</span></div><div class="muted">${esc(meta).slice(0,1800)}</div></div>`}function showTab(id,btn){document.querySelectorAll('.tab').forEach(x=>x.style.display='none');$(id).style.display='block';document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));if(btn)btn.classList.add('active')}async function loadDash(){try{const d=await api('/trade-lifecycle/dashboard?limit=100');const c=d.counts||{};total.textContent=c.total||0;pending.textContent=c.pending||0;approved.textContent=c.approved||0;externalDone.textContent=c.external_done||0;needsReview.textContent=c.needs_review||0;blocked.textContent=c.blocked||0;out.textContent=JSON.stringify(d,null,2);items.innerHTML=(d.items||[]).map(x=>{const t=x.ticket||{}, r=x.risk||{};return `<div class="item"><div class="item-title"><span>#${t.id} ${esc(t.symbol)} ${esc(t.side)}</span><span class="badge ${r.recommendation==='BLOCK_MANUAL_HANDOFF'?'badc':'warn'}">${esc(r.recommendation||'')}</span></div><div class="muted">approval=${esc(t.approval_state)} state=${esc(t.ticket_state)} risk=${esc(r.risk_score)}/${esc(r.risk_level)} reviews=${esc(x.review_count)}</div><div class="actions"><button onclick="pickTimeline(${t.id})">时间线</button><button onclick="pickReview(${t.id})">复盘</button></div></div>`}).join('')||'<div class="item">暂无票据</div>'}catch(e){out.textContent=e.message}}function pickTimeline(id){timelineTicket.value=id;showTab('timelineTab');loadTimeline()}function pickReview(id){rTicket.value=id;showTab('reviewTab')}async function loadTimeline(){try{const id=timelineTicket.value;const d=await api('/trade-lifecycle/tickets/'+id+'/timeline');timelineOut.textContent=JSON.stringify(d,null,2);timelineList.innerHTML=(d.timeline||[]).map(x=>item(x.title,x.status||x.phase,JSON.stringify(x.payload,null,2))).join('')||'<div class="item">暂无时间线</div>'}catch(e){timelineOut.textContent=e.message}}async function createReview(){try{const d=await api('/trade-lifecycle/reviews',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ticket_id:parseInt(rTicket.value),review_type:rType.value,outcome:rOutcome.value,operator:'local-operator',summary:rSummary.value,lessons:rLessons.value,risk_followup:rFollow.value,metrics:{},sync_operator:true})});reviewOut.textContent=JSON.stringify(d,null,2);await loadDash()}catch(e){reviewOut.textContent=e.message}}async function loadReport(){try{const d=await api('/trade-lifecycle/report?limit=100');reportOut.textContent=d.content;await loadReviews()}catch(e){reportOut.textContent=e.message}}async function syncOperator(){try{const d=await api('/trade-lifecycle/sync-operator',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({limit:100,sync_operator:true,create_report:true,create_notes:true,operator:'local-operator'})});reportOut.textContent=JSON.stringify(d,null,2)}catch(e){reportOut.textContent=e.message}}async function loadReviews(){try{const d=await api('/trade-lifecycle/reviews?limit=100');reviews.innerHTML=(d.reviews||[]).map(r=>item(`#${r.ticket_id} ${r.review_type}`,r.outcome,JSON.stringify(r,null,2))).join('')||'<div class="item">暂无复盘</div>'}catch(e){reviews.innerHTML=item('复盘加载失败','error',e.message)}}loadDash();</script></body></html>
