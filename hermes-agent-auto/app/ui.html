<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hermes Agent 实时控制总台</title>
<style>
:root{--bg:#070b16;--panel:#111a2e;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.1);--good:#16c784;--warn:#f5b841;--bad:#ff5c7a;--blue:#5b8cff;--purple:#9b7bff;--shadow:0 18px 60px rgba(0,0,0,.35)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,"Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 34%),radial-gradient(circle at top right,#2b185c 0,transparent 30%),var(--bg);color:var(--text)}.shell{max-width:1480px;margin:0 auto;padding:28px}.top{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:22px}.top h1{margin:0;font-size:34px}.top p{margin:8px 0 0;color:var(--muted)}.pill{display:inline-flex;gap:8px;align-items:center;padding:10px 14px;border:1px solid var(--line);border-radius:999px;color:var(--muted);background:rgba(255,255,255,.04)}.dot{width:10px;height:10px;border-radius:50%;background:var(--warn)}.dot.ok{background:var(--good)}.dot.bad{background:var(--bad)}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:18px}.card,.panel{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}.card{padding:16px;min-height:100px}.label{color:var(--muted);font-size:13px}.value{font-size:22px;font-weight:850;margin-top:9px;word-break:break-word}.panel{padding:18px;margin-bottom:18px}.panel h2{margin:0 0 14px;font-size:20px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.22);color:var(--text);border-radius:12px;padding:12px 13px;font-size:14px;outline:none}textarea{min-height:110px;resize:vertical;line-height:1.55}button{border:0;border-radius:12px;padding:11px 14px;color:white;background:var(--blue);font-weight:750;cursor:pointer}button.secondary{background:rgba(255,255,255,.09);border:1px solid var(--line)}button.purple{background:var(--purple)}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}.list{display:flex;flex-direction:column;gap:10px;max-height:360px;overflow:auto}.item{border:1px solid var(--line);border-radius:14px;padding:13px;background:rgba(0,0,0,.14)}.item-title{display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:800}.item-meta{color:var(--muted);font-size:12px;margin-top:7px;line-height:1.5}.badge{padding:4px 8px;border-radius:999px;font-size:12px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}.ok{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}.progress{height:13px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;border:1px solid var(--line)}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--good));transition:width .35s}.timeline{display:flex;flex-direction:column;gap:8px;max-height:460px;overflow:auto}.event{display:grid;grid-template-columns:100px 90px 1fr;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);padding:9px 0}.event .time,.event .type{font-size:12px;color:var(--muted)}pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:16px;padding:16px;max-height:500px;overflow:auto;color:#dfe8ff}.muted{color:var(--muted)}.toast{position:fixed;right:22px;bottom:22px;background:#111827;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);display:none;max-width:420px}@media(max-width:1100px){.grid,.cards,.row{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.event{grid-template-columns:1fr}}
</style></head>
<body><div class="shell">
<div class="top"><div><h1>Hermes Agent 实时控制总台 ⚡</h1><p>联网研究、实时工具调用、多签方案、钱包地址监控提醒、报告中心。</p></div><div class="pill"><span id="statusDot" class="dot"></span><span id="statusText">检测中...</span></div></div>
<div class="cards"><div class="card"><div class="label">服务</div><div id="healthValue" class="value">--</div></div><div class="card"><div class="label">搜索</div><div id="providerValue" class="value">--</div></div><div class="card"><div class="label">模型</div><div id="modelValue" class="value">--</div></div><div class="card"><div class="label">运行</div><div id="runCount" class="value">--</div></div><div class="card"><div class="label">报告</div><div id="reportCount" class="value">--</div></div><div class="card"><div class="label">钱包监控</div><div id="walletCount" class="value">--</div></div></div>
<div class="panel"><h2>当前运行进度</h2><div class="row"><div><div class="label">Run ID</div><div id="activeRun" class="value">--</div></div><div><div class="label">当前步骤</div><div id="activeStep" class="value">等待任务</div></div></div><div class="progress" style="margin-top:14px"><div id="progressBar" class="bar"></div></div><div id="progressText" class="muted" style="margin-top:8px">0%</div></div>
<div class="grid"><div>
<div class="panel"><h2>实时研究任务</h2><div class="row"><div><label>标题</label><input id="runTitle" value="Hermes Agent Report"></div><div><label>最大搜索结果</label><input id="runMax" type="number" min="0" max="20" value="5"></div></div><label style="margin-top:12px">指令</label><textarea id="runPrompt">搜索公开资料：GitHub Actions self-hosted runner official documentation，输出简短中文摘要并列出来源。</textarea><div class="actions"><button onclick="runOnceRealtime()">实时运行</button><button class="secondary" onclick="fillOkx()">OKX 示例</button><button class="secondary" onclick="refreshAll()">刷新</button></div></div>
<div class="panel"><h2>创建自动计划任务</h2><div class="row"><div><label>任务名称</label><input id="taskTitle" value="OKX public research"></div><div><label>间隔分钟</label><input id="taskMinutes" type="number" min="5" value="120"></div></div><label style="margin-top:12px">任务指令</label><textarea id="taskPrompt">每2小时搜索公开资料：OKX Web3 钱包/API/SDK/流动性挖矿项目对接要求，输出中文更新报告，标注来源。</textarea><div class="row" style="margin-top:12px"><div><label>最大搜索结果</label><input id="taskMax" type="number" min="0" max="20" value="8"></div><div><label>创建后立即运行</label><select id="taskRunNow"><option value="true">是</option><option value="false">否</option></select></div></div><div class="actions"><button class="purple" onclick="createTask()">创建并调度</button></div></div>
<div class="panel"><h2>多签钱包方案生成</h2><div class="row"><div><label>名称</label><input id="msName" value="Hermes Treasury Multisig"></div><div><label>链</label><select id="msChain"><option>ethereum</option><option>base</option><option>polygon</option><option>arbitrum</option><option>bsc</option><option>optimism</option></select></div></div><div class="row" style="margin-top:12px"><div><label>阈值 threshold</label><input id="msThreshold" type="number" min="2" value="2"></div><div><label>Owners，每行一个 0x 地址</label><textarea id="msOwners" placeholder="0x...&#10;0x...&#10;0x..."></textarea></div></div><div class="actions"><button onclick="createMultisigPlan()">生成多签方案</button></div></div>
<div class="panel"><h2>钱包地址监控提醒</h2><div class="row"><div><label>标签</label><input id="wmLabel" value="Treasury wallet"></div><div><label>链</label><select id="wmChain"><option>ethereum</option><option>base</option><option>polygon</option><option>arbitrum</option><option>bsc</option><option>optimism</option></select></div></div><label style="margin-top:12px">钱包地址</label><input id="wmAddress" placeholder="0x..."><label style="margin-top:12px">自定义 RPC，可留空使用默认公开 RPC</label><input id="wmRpc" placeholder="https://..."><div class="row" style="margin-top:12px"><div><label>监控间隔分钟</label><input id="wmPoll" type="number" min="1" value="5"></div><div><label>余额变化提醒</label><select id="wmAlert"><option value="true">开启</option><option value="false">关闭</option></select></div></div><div class="actions"><button onclick="createWalletMonitor()">添加并检查</button><button class="secondary" onclick="refreshWallets()">刷新全部监控</button></div></div>
<div class="panel"><h2>输出 / 报告预览</h2><pre id="out">等待操作...</pre></div>
</div><div>
<div class="panel"><h2>实时工具调用时间线</h2><div id="timeline" class="timeline"><div class="muted">等待事件...</div></div></div>
<div class="panel"><h2>钱包监控列表</h2><div id="walletList" class="list"><div class="muted">加载中...</div></div></div>
<div class="panel"><h2>钱包提醒</h2><div id="walletAlertList" class="list"><div class="muted">加载中...</div></div></div>
<div class="panel"><h2>运行记录</h2><div id="runList" class="list"><div class="muted">加载中...</div></div></div>
<div class="panel"><h2>自动任务列表</h2><div id="taskList" class="list"><div class="muted">加载中...</div></div></div>
<div class="panel"><h2>报告中心</h2><div class="actions" style="margin-top:0;margin-bottom:12px"><button class="secondary" onclick="loadReports()">刷新报告</button></div><div id="reportList" class="list"><div class="muted">加载中...</div></div></div>
</div></div></div><div id="toast" class="toast"></div>
<script>
const apiHeaders={'Content-Type':'application/json'};let eventSource=null,activeRunId=null,lastEventId=0;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',3500)}function show(o){out.textContent=typeof o==='string'?o:JSON.stringify(o,null,2)}async function api(p,o={}){const r=await fetch(p,o);const text=await r.text();let d;try{d=JSON.parse(text)}catch{d=text}if(!r.ok)throw new Error(typeof d==='string'?d:JSON.stringify(d));return d}function esc(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function cls(s){return s==='success'?'ok':s==='error'?'bad':'warn'}
async function loadHealth(){try{const h=await api('/health');healthValue.textContent=h.status;providerValue.textContent=h.search_provider;modelValue.textContent=h.model;statusText.textContent='运行中';statusDot.className='dot ok';providerValue.className='value '+(h.search_provider==='none'?'warn':'ok')}catch(e){healthValue.textContent='error';statusText.textContent='离线';statusDot.className='dot bad';show(e.message)}}
async function loadRuns(){try{const runs=await api('/runs');runCount.textContent=runs.length;runList.innerHTML=runs.length?runs.slice(0,12).map(r=>`<div class="item" onclick="selectRun('${r.run_id}')"><div class="item-title"><span>${esc(r.title)}</span><span class="badge ${cls(r.status)}">${r.status}</span></div><div class="item-meta">Run: ${r.run_id} · ${r.progress}%<br>${esc(r.current_step)}<br>报告: ${esc(r.report_path||'无')}</div></div>`).join(''):'<div class="muted">暂无运行记录</div>'}catch(e){show(e.message)}}
async function loadTasks(){try{const a=await api('/tasks');taskList.innerHTML=a.length?a.map(t=>`<div class="item"><div class="item-title"><span>${esc(t.title)}</span><span class="badge ${t.last_status==='success'?'ok':'warn'}">${t.enabled?'enabled':'disabled'}</span></div><div class="item-meta">ID:${t.id} · 间隔:${t.interval_minutes}分钟<br>最后状态:${t.last_status||'未运行'}<br>${esc(t.last_report_path||'')}</div></div>`).join(''):'<div class="muted">暂无任务</div>'}catch(e){show(e.message)}}
async function loadReports(){try{const a=await api('/reports');reportCount.textContent=a.length;reportList.innerHTML=a.length?a.slice(0,12).map(r=>`<div class="item"><div class="item-title"><span>${esc(r.id)}</span><button class="secondary" onclick="openReport('${encodeURIComponent(r.id)}')">打开</button></div><div class="item-meta">${r.size} bytes<br>${esc(r.path)}</div></div>`).join(''):'<div class="muted">暂无报告</div>'}catch(e){show(e.message)}}
async function loadWallets(){try{const a=await api('/wallet-monitors');walletCount.textContent=a.length;walletList.innerHTML=a.length?a.map(w=>`<div class="item"><div class="item-title"><span>${esc(w.label)}</span><span class="badge ${w.last_status==='success'?'ok':'warn'}">${w.last_status||'new'}</span></div><div class="item-meta">${esc(w.chain)} · ${esc(w.address)}<br>余额: ${esc(w.last_balance_native||'未检查')} native<br>区块: ${w.last_block||'--'} · 检查: ${esc(w.last_checked_at||'--')}<br>${esc(w.last_error||'')}</div><div class="actions"><button class="secondary" onclick="refreshWallet(${w.id})">立即检查</button></div></div>`).join(''):'<div class="muted">暂无钱包监控</div>'}catch(e){show(e.message)}}
async function loadWalletAlerts(){try{const a=await api('/wallet-alerts');walletAlertList.innerHTML=a.length?a.map(x=>`<div class="item"><div class="item-title"><span>${esc(x.event_type)}</span><span class="badge warn">alert</span></div><div class="item-meta">${esc(x.message)}<br>block: ${x.block_number||'--'} · ${esc(x.created_at)}</div></div>`).join(''):'<div class="muted">暂无提醒</div>'}catch(e){show(e.message)}}
async function openReport(id){try{show(await api('/reports/'+id))}catch(e){show(e.message)}}
async function runOnceRealtime(){show('实时任务已提交...');timeline.innerHTML='';try{const d=await api('/run_async',{method:'POST',headers:apiHeaders,body:JSON.stringify({title:runTitle.value,prompt:runPrompt.value,max_results:parseInt(runMax.value||'5'),notify:false})});activeRunId=d.run_id;activeRun.textContent=activeRunId;connectEvents(activeRunId);toast('实时任务已启动');loadRuns()}catch(e){show(e.message)}}
async function createTask(){try{const d=await api('/tasks',{method:'POST',headers:apiHeaders,body:JSON.stringify({title:taskTitle.value,prompt:taskPrompt.value,interval_minutes:parseInt(taskMinutes.value||'120'),max_results:parseInt(taskMax.value||'8'),notify:false,enabled:true,run_now:taskRunNow.value==='true'})});show(d);toast('计划任务已创建');refreshAll()}catch(e){show(e.message)}}
async function createMultisigPlan(){try{const owners=msOwners.value.split(/\r?\n/).map(x=>x.trim()).filter(Boolean);const d=await api('/multisig/plan',{method:'POST',headers:apiHeaders,body:JSON.stringify({name:msName.value,chain:msChain.value,owners,threshold:parseInt(msThreshold.value||'2')})});show(d);toast('多签方案已生成')}catch(e){show(e.message)}}
async function createWalletMonitor(){try{const d=await api('/wallet-monitors',{method:'POST',headers:apiHeaders,body:JSON.stringify({label:wmLabel.value,chain:wmChain.value,address:wmAddress.value,rpc_url:wmRpc.value||null,poll_minutes:parseInt(wmPoll.value||'5'),alert_on_change:wmAlert.value==='true',enabled:true})});show(d);toast('钱包监控已添加');refreshAll()}catch(e){show(e.message)}}
async function refreshWallet(id){try{show(await api('/wallet-monitors/'+id+'/refresh',{method:'POST'}));refreshAll()}catch(e){show(e.message)}}async function refreshWallets(){try{show(await api('/wallet-monitors/refresh-all',{method:'POST'}));refreshAll()}catch(e){show(e.message)}}
function connectEvents(id){if(eventSource)eventSource.close();eventSource=new EventSource('/events?run_id='+encodeURIComponent(id));eventSource.onmessage=m=>{const ev=JSON.parse(m.data);lastEventId=ev.id;appendEvent(ev);updateProgress(ev);if(ev.status==='success'||ev.status==='error'){eventSource.close();refreshAll();toast(ev.status==='success'?'任务完成':'任务失败')}};eventSource.onerror=()=>{toast('事件流中断，启用轮询');pollEvents(id)}}async function pollEvents(id){try{const a=await api('/events_snapshot?last_id='+lastEventId+'&run_id='+encodeURIComponent(id));a.forEach(ev=>{lastEventId=ev.id;appendEvent(ev);updateProgress(ev)});setTimeout(()=>pollEvents(id),2000)}catch(e){}}
function appendEvent(ev){if(timeline.querySelector('.muted'))timeline.innerHTML='';const d=document.createElement('div');d.className='event';d.innerHTML=`<div class="time">${new Date(ev.created_at).toLocaleTimeString()}</div><div class="type ${cls(ev.status)}">${esc(ev.type)}</div><div>${esc(ev.message)}${ev.data&&ev.data.tool?`<div class="item-meta">tool: ${esc(ev.data.tool)}</div>`:''}</div>`;timeline.prepend(d)}function updateProgress(ev){activeRun.textContent=ev.run_id||activeRun.textContent;activeStep.textContent=ev.message||activeStep.textContent;if(ev.progress!==null&&ev.progress!==undefined){progressBar.style.width=ev.progress+'%';progressText.textContent=ev.progress+'%'}if(ev.status==='success'||ev.status==='error')show(ev)}async function selectRun(id){activeRunId=id;activeRun.textContent=id;timeline.innerHTML='';lastEventId=0;(await api('/events_snapshot?last_id=0&run_id='+encodeURIComponent(id))).forEach(ev=>{lastEventId=ev.id;appendEvent(ev);updateProgress(ev)})}
function fillOkx(){runTitle.value='OKX public research';runPrompt.value='搜索公开资料：OKX Web3 钱包/API/SDK/流动性挖矿项目对接要求，输出中文报告，标注来源。';runMax.value=8}async function refreshAll(){await loadHealth();await loadRuns();await loadTasks();await loadReports();await loadWallets();await loadWalletAlerts()}refreshAll();setInterval(refreshAll,10000);
</script></body></html>
