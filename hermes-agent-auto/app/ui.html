<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes Agent 控制台</title>
  <style>
    :root{--bg:#0b1020;--panel:#121a30;--panel2:#17223c;--text:#eef3ff;--muted:#93a4c7;--line:rgba(255,255,255,.09);--good:#16c784;--warn:#f5b841;--bad:#ff5c7a;--blue:#5b8cff;--blue2:#7aa2ff;--shadow:0 18px 60px rgba(0,0,0,.35)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at top left,#1b2d5d 0,transparent 35%),var(--bg);color:var(--text)}
    .shell{max-width:1240px;margin:0 auto;padding:28px}.topbar{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:22px}.brand h1{margin:0;font-size:34px;letter-spacing:-.04em}.brand p{margin:8px 0 0;color:var(--muted)}
    .status-pill{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:999px;color:var(--muted)}.dot{width:10px;height:10px;border-radius:50%;background:var(--warn);box-shadow:0 0 20px currentColor}.dot.ok{background:var(--good)}.dot.bad{background:var(--bad)}
    .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}.card,.panel{background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow)}.card{padding:18px;min-height:112px}.card .label{color:var(--muted);font-size:13px}.card .value{font-size:24px;font-weight:800;margin-top:10px;word-break:break-word}.panel{padding:20px;margin-bottom:18px}.panel h2{margin:0 0 14px;font-size:20px}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;color:var(--muted);font-size:13px;margin-bottom:7px}input,textarea,select{width:100%;border:1px solid var(--line);background:rgba(0,0,0,.2);color:var(--text);border-radius:12px;padding:12px 13px;font-size:14px;outline:none}textarea{min-height:118px;resize:vertical;line-height:1.55}input:focus,textarea:focus{border-color:rgba(91,140,255,.75);box-shadow:0 0 0 4px rgba(91,140,255,.12)}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
    button,.btn{border:0;border-radius:12px;padding:12px 15px;color:white;background:var(--blue);font-weight:700;cursor:pointer;transition:.15s transform,.15s opacity;text-decoration:none;display:inline-flex;align-items:center;gap:8px}button:hover,.btn:hover{transform:translateY(-1px);background:var(--blue2)}button.secondary{background:rgba(255,255,255,.09);color:var(--text);border:1px solid var(--line)}button.warn{background:#a87210}.list{display:flex;flex-direction:column;gap:10px}.item{border:1px solid var(--line);border-radius:14px;padding:14px;background:rgba(0,0,0,.14)}.item-title{display:flex;justify-content:space-between;gap:10px;align-items:center;font-weight:800}.item-meta{color:var(--muted);font-size:12px;margin-top:7px;line-height:1.5}.badge{padding:4px 8px;border-radius:999px;font-size:12px;border:1px solid var(--line);color:var(--muted);white-space:nowrap}.badge.ok{color:var(--good);border-color:rgba(22,199,132,.35)}.badge.warn{color:var(--warn);border-color:rgba(245,184,65,.35)}pre{white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:16px;padding:16px;max-height:480px;overflow:auto;color:#dfe8ff}.muted{color:var(--muted)}.small{font-size:12px}.toast{position:fixed;right:22px;bottom:22px;background:#111827;border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);display:none;max-width:420px}.footer{margin-top:24px;color:var(--muted);font-size:13px;text-align:center}@media(max-width:920px){.grid,.cards,.row{grid-template-columns:1fr}.topbar{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar"><div class="brand"><h1>Hermes Agent 控制台 ⚡</h1><p>本地自主公开资料研究、联网搜索、定时任务和 Markdown 报告中心。</p></div><div class="status-pill"><span id="statusDot" class="dot"></span><span id="statusText">正在检测...</span></div></div>
    <div class="cards"><div class="card"><div class="label">服务状态</div><div id="healthValue" class="value">--</div></div><div class="card"><div class="label">搜索供应商</div><div id="providerValue" class="value">--</div></div><div class="card"><div class="label">模型</div><div id="modelValue" class="value">--</div></div><div class="card"><div class="label">报告数量</div><div id="reportCount" class="value">--</div></div></div>
    <div class="grid"><div>
      <div class="panel"><h2>运行一次研究任务</h2><div class="row"><div><label>报告标题</label><input id="runTitle" value="Hermes Agent Report"></div><div><label>最大搜索结果数</label><input id="runMax" type="number" min="0" max="20" value="5"></div></div><div style="margin-top:12px"><label>研究指令</label><textarea id="runPrompt">搜索公开资料：GitHub Actions self-hosted runner official documentation，输出简短中文摘要并列出来源。</textarea></div><div class="actions"><button onclick="runOnce()">立即运行</button><button class="secondary" onclick="fillOkx()">填入 OKX 示例</button><button class="secondary" onclick="refreshAll()">刷新状态</button></div></div>
      <div class="panel"><h2>创建自动计划任务</h2><div class="row"><div><label>任务名称</label><input id="taskTitle" value="OKX public research"></div><div><label>执行间隔，分钟</label><input id="taskMinutes" type="number" min="5" value="120"></div></div><div style="margin-top:12px"><label>任务指令</label><textarea id="taskPrompt">每2小时搜索公开资料：OKX Web3 钱包/API/SDK/流动性挖矿项目对接要求，输出中文更新报告，标注来源。</textarea></div><div class="row" style="margin-top:12px"><div><label>最大搜索结果数</label><input id="taskMax" type="number" min="0" max="20" value="8"></div><div><label>创建后立即运行</label><select id="taskRunNow"><option value="true">是</option><option value="false">否</option></select></div></div><div class="actions"><button onclick="createTask()">创建并调度</button></div></div>
    </div><div>
      <div class="panel"><h2>自动任务列表</h2><div id="taskList" class="list"><div class="muted">正在加载...</div></div></div>
      <div class="panel"><h2>报告中心</h2><div class="actions" style="margin-top:0;margin-bottom:12px"><button class="secondary" onclick="loadReports()">刷新报告</button></div><div id="reportList" class="list"><div class="muted">正在加载...</div></div></div>
    </div></div>
    <div class="panel"><h2>输出 / 报告预览</h2><pre id="out">等待操作...</pre></div><div class="footer">Hermes Agent Auto Executor · Local-first · Public-source research only</div>
  </div><div id="toast" class="toast"></div>
<script>
const apiHeaders={'Content-Type':'application/json'};function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',3800)}function show(obj){document.getElementById('out').textContent=typeof obj==='string'?obj:JSON.stringify(obj,null,2)}async function api(path,options={}){const r=await fetch(path,options);const text=await r.text();let data;try{data=JSON.parse(text)}catch{data=text}if(!r.ok){throw new Error(typeof data==='string'?data:JSON.stringify(data))}return data}
async function loadHealth(){try{const h=await api('/health');healthValue.textContent=h.status;providerValue.textContent=h.search_provider;modelValue.textContent=h.model;statusText.textContent='运行中';statusDot.className='dot ok';providerValue.style.color=h.search_provider==='none'?'var(--warn)':'var(--good)'}catch(e){healthValue.textContent='error';statusText.textContent='离线';statusDot.className='dot bad';show(e.message)}}
async function loadTasks(){try{const tasks=await api('/tasks');if(!tasks.length){taskList.innerHTML='<div class="muted">暂无任务</div>';return}taskList.innerHTML=tasks.map(t=>`<div class="item"><div class="item-title"><span>${escapeHtml(t.title)}</span><span class="badge ${t.last_status==='success'?'ok':'warn'}">${t.enabled?'enabled':'disabled'}</span></div><div class="item-meta">ID: ${t.id} · 间隔: ${t.interval_minutes} 分钟 · 搜索数: ${t.max_results}<br>最后状态: ${t.last_status||'未运行'}<br>最后报告: ${t.last_report_path||'无'}</div></div>`).join('')}catch(e){taskList.innerHTML='<div class="muted">加载失败</div>';show(e.message)}}
async function loadReports(){try{const reports=await api('/reports');reportCount.textContent=reports.length;if(!reports.length){reportList.innerHTML='<div class="muted">暂无报告</div>';return}reportList.innerHTML=reports.slice(0,12).map(r=>`<div class="item"><div class="item-title"><span>${escapeHtml(r.id)}</span><button class="secondary" onclick="openReport('${encodeURIComponent(r.id)}')">打开</button></div><div class="item-meta">${r.size} bytes<br>${escapeHtml(r.path)}</div></div>`).join('')}catch(e){reportList.innerHTML='<div class="muted">加载失败</div>';show(e.message)}}
async function openReport(id){try{const text=await api('/reports/'+id);show(text)}catch(e){show(e.message)}}async function runOnce(){show('正在运行一次任务，请等待...');try{const data=await api('/run',{method:'POST',headers:apiHeaders,body:JSON.stringify({title:runTitle.value,prompt:runPrompt.value,max_results:parseInt(runMax.value||'5'),notify:false})});show(data);toast('任务完成，报告已生成');await loadReports()}catch(e){show(e.message);toast('运行失败')}}
async function createTask(){show('正在创建计划任务，请等待...');try{const data=await api('/tasks',{method:'POST',headers:apiHeaders,body:JSON.stringify({title:taskTitle.value,prompt:taskPrompt.value,interval_minutes:parseInt(taskMinutes.value||'120'),max_results:parseInt(taskMax.value||'8'),notify:false,enabled:true,run_now:taskRunNow.value==='true'})});show(data);toast('计划任务已创建');await loadTasks();await loadReports()}catch(e){show(e.message);toast('创建失败')}}
function fillOkx(){runTitle.value='OKX public research';runPrompt.value='搜索公开资料：OKX Web3 钱包/API/SDK/流动性挖矿项目对接要求，输出中文报告，标注来源。';runMax.value=8}function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}async function refreshAll(){await loadHealth();await loadTasks();await loadReports();toast('状态已刷新')}refreshAll();setInterval(loadHealth,15000);
</script></body></html>
