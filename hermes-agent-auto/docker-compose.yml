name: hermes_agent_auto_isolated

services:
  hermes-agent:
    build: .
    container_name: hermes-agent-auto-runtime
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HERMES_AGENT_HOST_PORT:-8099}:8099"
    volumes:
      - ./storage:/app/storage
    networks:
      - hermes-agent-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8099/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hermes-agent-net:
    name: hermes-agent-auto-net
    driver: bridge
